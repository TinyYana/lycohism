# 輝能祭壇配方（v0.7）。在建好的祭壇中央手持 catalyst 右鍵，並把 ingredients 丟在祭壇周圍
# （約 2.5 格內的掉落物），消耗玩家身上的輝能（energy-sun / energy-moon）即可合成。
# key 用 Lycohism 內容 id（如 moon_core）或原版材質名（如 GOLD_INGOT）。result 為 id 或 材質:數量。
recipes:

  # 輝能之鏡：高階道具，改在祭壇製作（消耗日月輝＋月輝核心＋蓄能晶）。
  radiant_focus:
    catalyst: GOLD_INGOT
    ingredients:
      - "moon_core:1"
      - "energy_crystal:1"
    energy-sun: 50
    energy-moon: 50
    result: "radiant_focus:1"
