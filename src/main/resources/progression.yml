# Lycohism 調律之路（progression line）
# 每個 stage 是一個里程碑。完成條件可用三種（可混用，需全部滿足）：
#   discoveries  : 發現紀錄 id 全部具備
#   advancements : 原版進度 namespaced key 全部完成
#   facilities   : 設施等級 >= 指定值（workshop / study / greenhouse）
# 顯示名稱、描述、提示放在 lang_zh.yml / lang_en.yml 的 progression.stages.<id>（title / lore / hint）。
# preview: true 代表「規劃中」章節，永遠不算完成，只用來預告下一步方向。
# 章節順序即顯示順序；最多 14 個會顯示在 UI 上。
progression:
  stages:

    awakening:
      icon: DANDELION
      requires:
        discoveries: [ morning_dew ]

    workshop:
      icon: CRAFTING_TABLE
      requires:
        facilities: { workshop: 1 }

    first_tools:
      icon: GLASS_BOTTLE
      requires:
        discoveries: [ dew_light ]

    rain:
      icon: WATER_BUCKET
      requires:
        discoveries: [ rain_breath ]

    study:
      icon: BOOKSHELF
      requires:
        facilities: { study: 1 }

    greenhouse:
      icon: FLOWERING_AZALEA
      requires:
        facilities: { greenhouse: 1 }

    night:
      icon: CLOCK
      requires:
        discoveries: [ moon_dew ]

    # 進度線在這裡跟原版地獄掛鉤（也是書房遠征入口的門檻）。
    nether_gate:
      icon: FLINT_AND_STEEL
      advancement-sound: minecraft:block.portal.travel
      requires:
        advancements: [ minecraft:story/enter_the_nether ]

    # v0.9.31 地獄廢址：在地獄深處找到並認領古老的腐壞中繼廢址。
    infernal_relay:
      icon: SOUL_CAMPFIRE
      advancement-sound: minecraft:block.beacon.activate
      advancement-parent: nether_gate
      requires:
        discoveries: [ infernal_relay ]

    # v0.9.32 燼華鍛爐：建造並使用地獄鍛爐提煉焰輝碎片。
    ember_forge:
      icon: MAGMA_BLOCK
      advancement-sound: minecraft:block.blastfurnace.fire_crackle
      advancement-parent: infernal_relay
      requires:
        discoveries: [ ember_forge ]

    radiant_vein:
      icon: RAW_GOLD
      advancement-sound: minecraft:block.amethyst_block.resonate
      requires:
        discoveries: [ radiant_ore ]

    expedition:
      icon: FILLED_MAP
      advancement-sound: minecraft:item.goat_horn.sound.0
      requires:
        discoveries: [ rainfall_forest ]

    expedition_yield:
      icon: SLIME_BALL
      requires:
        discoveries: [ moss_balm ]

    # ── v0.6 輝能線 → v0.7 日月分支 ────────────────────────────
    radiance:
      icon: AMETHYST_SHARD
      requires:
        discoveries: [ energy_crystal ]

    # 從 radiance 分成日／月兩支。v0.8.2 #3：兩支現在「一碗水端平」，形狀完全對稱——
    # 塔 → 專屬遠征（核心）→ 調律（力量）；輝能網路／據點拆成中立支線，不再偏在日線。
    # ── 日線：日輝塔 → 潮汐深淵（日輝核心）→ 日之調律（日炎鎬）─────────────
    solar_tower:
      icon: GOLD_BLOCK
      advancement-parent: radiance
      requires:
        discoveries: [ sun_tower ]

    tidal_depths:
      icon: HEART_OF_THE_SEA
      advancement-sound: minecraft:item.goat_horn.sound.0
      advancement-parent: solar_tower
      requires:
        discoveries: [ tidal_depths ]

    solar_attunement:
      icon: GOLDEN_PICKAXE
      advancement-parent: tidal_depths
      requires:
        discoveries: [ solar_pick ]

    # ── 月線：月輝塔 → 永夜荒原（月輝核心）→ 月之調律（輝能之鏡）─────────────
    lunar_tower:
      icon: AMETHYST_BLOCK
      advancement-parent: radiance
      requires:
        discoveries: [ moon_tower ]

    lunar_waste:
      icon: ECHO_SHARD
      advancement-parent: lunar_tower
      requires:
        discoveries: [ moonless_waste ]

    moon_attunement:
      icon: CLOCK
      advancement-parent: lunar_waste
      requires:
        discoveries: [ radiant_focus ]

    # ── 中立：輝能網路／據點（不偏日月）：核心 → 祭壇 → 中繼網 → 設施升級 ──────
    radiant_nexus:
      icon: BEACON
      advancement-parent: radiance
      requires:
        discoveries: [ energy_nexus ]

    energy_altar:
      icon: ENCHANTING_TABLE
      advancement-sound: minecraft:block.enchantment_table.use
      advancement-parent: radiant_nexus
      requires:
        discoveries: [ energy_altar ]

    energy_grid:
      icon: LIGHTNING_ROD
      advancement-parent: radiant_nexus
      requires:
        discoveries: [ energy_relay ]

    facility_growth:
      icon: SCAFFOLDING
      advancement-sound: minecraft:entity.player.levelup
      advancement-parent: energy_grid
      requires:
        facilities: { workshop: 2 }

    # v0.9.2 自動化：蓋出第一台自動調律機，讓基地接手建材加工（輝能網路的持續出口）。
    attunement_engine:
      icon: BLAST_FURNACE
      advancement-sound: minecraft:block.beacon.activate
      advancement-parent: facility_growth
      requires:
        discoveries: [ attunement_engine ]

    # v0.9.3 自動化擴充：溫室育苗機（月輝，植物素材加工）。
    seedling_cultivator:
      icon: COMPOSTER
      advancement-parent: attunement_engine
      requires:
        discoveries: [ seedling_cultivator ]

    # v0.9.3 自動化擴充：書房現象凝縮台（月輝，學術素材凝縮）。
    phenomenon_condenser:
      icon: LECTERN
      advancement-parent: attunement_engine
      requires:
        discoveries: [ phenomenon_condenser ]

    # v0.9.3 解謎：解開第一座封印祠（需已建輝能核心＋持蓄能晶）。
    sealed_shrine:
      icon: CHISELED_DEEPSLATE
      advancement-sound: minecraft:block.amethyst_block.resonate
      advancement-parent: radiant_nexus
      requires:
        discoveries: [ sealed_shrine ]

    # ── v0.8 蝕：日月兩支線在此收束 ───────────────────────────────
    # 暮蝕之境：要走過「日」的潮汐深淵與「月」的永夜荒原兩條線，蝕的章節才開啟（v0.8.1 #5）。
    eclipse_realm:
      icon: CRYING_OBSIDIAN
      advancement-sound: minecraft:item.goat_horn.sound.0
      advancement-parent: facility_growth
      requires:
        discoveries: [ tidal_depths, moonless_waste, eclipse_realm ]

    # 蝕影守望者：召喚並擊敗 BOSS，取得蝕輝結晶。
    eclipse_warden:
      icon: NETHER_STAR
      advancement-sound: minecraft:entity.wither.death
      advancement-parent: eclipse_realm
      requires:
        discoveries: [ eclipse_warden ]

    # 三階設施：用蝕輝結晶把設施升到 Lv3。v0.8 的終點。
    facility_growth_3:
      icon: HEART_OF_THE_SEA
      advancement-sound: minecraft:block.beacon.power_select
      advancement-parent: eclipse_warden
      requires:
        facilities: { workshop: 3 }
