  lunar_spore: "<gradient:#d8b8ff:#f0e0ff>月華灑</gradient>"
  moonless_waste: "<gradient:#3a3a5a:#9a8fd6>永夜荒原</gradient>"
  night_shade: "<gradient:#4a4466:#8a7fbf>夜魅</gradient>"

structures:
  moss-altar:
    chest-name: "<dark_green>苔生調律壇的供物</dark_green>"
  dew-well:
    chest-name: "<aqua>露語井的沉積物</aqua>"
  wind-circle:
    chest-name: "<gray>風痕石環的藏物</gray>"
  rainfall-dungeon:
    chest-name: "<dark_aqua>雨浸地窖的補給箱</dark_aqua>"
  moondial:
    chest-name: "<light_purple>月晷下的供奉</light_purple>"
  sundial:
    chest-name: "<gold>日晷下的供奉</gold>"

items:
  dew_light:
    name: "<gradient:#fff6c0:#ffffff>露光瓶</gradient>"
    lore:
      - "<gray>在黑暗中提供兩分鐘夜視。</gray>"
      - "<dark_gray>右鍵消耗；使用後留下空玻璃瓶。</dark_gray>"
  flower_bookmark:
    name: "<gradient:#ffd6e8:#ffffff>花籤</gradient>"
    lore:
      - "<gray>記住一個地方，之後指引方向。</gray>"
      - "<dark_gray>潛行右鍵記住、右鍵指引。</dark_gray>"
  stonework_hammer:
    name: "<gradient:#cfd6df:#ffffff>石工槌</gradient>"
    lore:
      - "<gray>讓石材加工更方便。</gray>"
      - "<dark_gray>右鍵石材方塊循環變體。</dark_gray>"
  rain_bandage:
    name: "<gradient:#8fd3ff:#ffffff>雨紋繃帶</gradient>"
    lore:
      - "<gray>用雨息浸潤的簡單繃帶。</gray>"
      - "<dark_gray>右鍵恢復少量生命，使用後消耗。</dark_gray>"
  flower_vein_shears:
    name: "<gradient:#ff9ed6:#ffffff>花脈剪</gradient>"
    lore:
      - "<gray>讓未成熟作物立刻長成。</gray>"
      - "<dark_gray>成熟後再右鍵可採收並補種。</dark_gray>"
  wind_vane:
    name: "<gradient:#b8e6ff:#ffffff>風標</gradient>"
    lore:
      - "<gray>讀取此刻的自然採集條件。</gray>"
      - "<dark_gray>拿在任一手時，持續顯示環境讀數。</dark_gray>"
  moon_pouch:
    name: "<gradient:#c7b8ff:#ffffff>月紗袋</gradient>"
    lore:
      - "<gray>自動收納撿到的自然現象。</gray>"
      - "<dark_gray>右鍵取出袋內全部內容。</dark_gray>"
  leyline_probe:
    name: "<gradient:#d8c3a5:#fff1d6>地脈探針</gradient>"
    lore:
      - "<gray>讓地脈砂回應附近的礦脈。</gray>"
      - "<dark_gray>拿在任一手時，持續顯示最近礦脈。</dark_gray>"
  rain_gate:
    name: "<gradient:#8fd3ff:#d9f3ff>雨痕門符</gradient>"
    lore:
      - "<gray>循著雨痕，前往下著雨的森林。</gray>"
      - "<dark_gray>主世界右鍵前往，遠征世界右鍵返回原地。</dark_gray>"
      - "<dark_gray>需先踏入過地獄，雨痕才會回應。</dark_gray>"
  moss_balm:
    name: "<gradient:#7fd6a0:#d8ffe8>苔露膏</gradient>"
    lore:
      - "<gray>右鍵塗抹，獲得一段溫和的持續再生。</gray>"
      - "<dark_gray>只能用雨後森林的苔華在溫室調製。</dark_gray>"
  moss_fertile:
    name: "<gradient:#9ad17f:#e6ffcf>苔肥</gradient>"
    lore:
      - "<gray>右鍵植物，催長周圍一小塊作物與植被。</gray>"
      - "<dark_gray>只能用雨後森林的苔華在溫室調製。</dark_gray>"
  energy_crystal:
    name: "<gradient:#ffe9a8:#a8c8ff>蓄能晶</gradient>"
    lore:
      - "<gray>放在背包就會吸收滿溢的輝能。</gray>"
      - "<gray>你的能量池滿了之後，多的會存進這裡。</gray>"
      - "<dark_gray>右鍵把晶體裡的能量倒回自身的輝能池。</dark_gray>"
  radiant_focus:
    name: "<gradient:#ffd98a:#c0a8ff>輝能之鏡</gradient>"
    lore:
      - "<gray>右鍵引動<gold>日輝</gold>：抗火與力量的日之祝福。</gray>"
      - "<gray>潛行右鍵引動<aqua>月輝</aqua>：夜視與緩降的月之祝福。</gray>"
      - "<dark_gray>需要永夜荒原的月輝核心才能製作。</dark_gray>"
  solar_pick:
    name: "<gradient:#ffe07a:#ffb24a>日炎鎬</gradient>"
    lore:
      - "<gray>右鍵消耗<gold>日輝</gold>，獲得一段挖掘加速。</gray>"
      - "<dark_gray>工房 Lv2 解鎖。</dark_gray>"
  star_compass:
    name: "<gradient:#aaccff:#e0f0ff>星圖羅盤</gradient>"
    lore:
      - "<gray>右鍵指出最近<aqua>能量塔</aqua>的方向與距離。</gray>"
      - "<dark_gray>書房 Lv2 解鎖。</dark_gray>"
  lunar_spore:
    name: "<gradient:#d8b8ff:#f0e0ff>月華灑</gradient>"
    lore:
      - "<gray>右鍵植物，消耗<aqua>月輝</aqua>對一片區域施骨粉。</gray>"
      - "<dark_gray>溫室 Lv2 解鎖。</dark_gray>"
  blueprint:
    name: "<gradient:#9ad1ff:#e0f0ff>{structure} 藍圖</gradient>"
    lore:
      - "<gray>看向地面右鍵：顯示<green>幽靈輪廓</green>（綠=有、紅=缺）。</gray>"
      - "<gray>潛行右鍵：用背包材料<white>直接建造</white>。</gray>"
      - "<dark_gray>建造 {structure} 的設計圖。</dark_gray>"

# 調律之路各章節文案（對應 progression.yml 的 stage id）。
progression:
  stages:
    awakening:
      title: "<white>初遇晨露</white>"
      lore:
        - "<gray>清晨的第一滴自然之力。</gray>"
      details:
        - "<gray>晨露採集與初階自然配方。</gray>"
      hint: "<gray>清晨在草地、花叢間採集晨露。</gray>"
    workshop:
      title: "<white>喚醒工房</white>"
      lore:
        - "<gray>讓基地長出第一個功能。</gray>"
      details:
        - "<gray>工具製作、建材加工與雨息附魔。</gray>"
      hint: "<gray>備齊材料，在工作台修復工房。</gray>"
    first_tools:
      title: "<white>第一件生活工具</white>"
      lore:
        - "<gray>自然開始替你解決生存的小麻煩。</gray>"
      details:
        - "<gray>露光瓶：消耗後獲得兩分鐘夜視。</gray>"
      hint: "<gray>在工房用晨露做出露光瓶。</gray>"
    rain:
      title: "<white>雨的氣息</white>"
      lore:
        - "<gray>雨天不再只是等待。</gray>"
      details:
        - "<gray>採集雨息，催長作物並製作恢復用品。</gray>"
      hint: "<gray>雨天在水邊與森林採集雨息。</gray>"
    study:
      title: "<white>翻開書房</white>"
      lore:
        - "<gray>開始記錄你走過的路。</gray>"
      details:
        - "<gray>手冊、圖鑑、發現紀錄與調律之路。</gray>"
      hint: "<gray>備齊材料，整理書房。</gray>"
    greenhouse:
      title: "<white>溫室生機</white>"
      lore:
        - "<gray>植物與農業有了著落。</gray>"
      details:
        - "<gray>植物培育、花脈剪、苔露膏與苔肥。</gray>"
      hint: "<gray>備齊材料，開墾溫室。</gray>"
    night:
      title: "<white>夜的記憶</white>"
      lore:
        - "<gray>夜晚與月色值得停留。</gray>"
      details:
        - "<gray>月露，以及風標與月紗袋的製作。</gray>"
      hint: "<gray>晴朗的滿月夜採集月露。</gray>"
    nether_gate:
      title: "<white>通往地獄</white>"
      lore:
        - "<gray>更遠的路，需要更深的足跡。</gray>"
      details:
        - "<gray>書房中的雨後森林入口。</gray>"
      hint: "<gray>踏入地獄一次，書房的遠征入口便會解鎖。</gray>"
    expedition:
      title: "<white>第一次遠征</white>"
      lore:
        - "<gray>走出主世界，去雨後的森林。</gray>"
      details:
        - "<gray>雨後森林與專屬素材苔華。</gray>"
      hint: "<gray>從書房的遠征介面前往雨後森林。</gray>"
    expedition_yield:
      title: "<white>帶回的禮物</white>"
      lore:
        - "<gray>遠征的收穫，化成只有那裡才有的東西。</gray>"
      details:
        - "<gray>用苔華調製苔露膏與苔肥。</gray>"
      hint: "<gray>用苔華在溫室調製苔露膏。</gray>"
    radiance:
      title: "<white>輝能初現</white>"
      lore:
        - "<gray>日與月的光，開始能被收攏。</gray>"
      details:
        - "<gray>蓄能晶；在天空下被動蓄日輝與月輝。</gray>"
      hint: "<gray>在工房製作蓄能晶，到戶外站在天空下蓄能。</gray>"
    solar_tower:
      title: "<gold>日之塔</gold>"
      lore:
        - "<gray>循著日光，立起第一座高塔。</gray>"
      details:
        - "<gray>日輝塔：高聳的剛性結構，為附近供應日輝。</gray>"
      hint: "<gray>建造日輝塔並右鍵塔基核心啟動（管理員可 /lycohism build sun_tower）。</gray>"
    lunar_tower:
      title: "<aqua>月之塔</aqua>"
      lore:
        - "<gray>循著月色，立起對應的高塔。</gray>"
      details:
        - "<gray>月輝塔：與日輝塔對稱，為附近供應月輝。</gray>"
      hint: "<gray>建造月輝塔並右鍵塔基核心啟動。</gray>"
    lunar_waste:
      title: "<white>踏入永夜</white>"
      lore:
        - "<gray>沒有黎明的荒原，是月之力的源頭。</gray>"
      details:
        - "<gray>永夜荒原：整日可蓄月輝、月輝核心的產地。</gray>"
      hint: "<gray>從書房遠征介面前往永夜荒原。</gray>"
    moon_attunement:
      title: "<white>月之調律</white>"
      lore:
        - "<gray>把帶回的月輝核心，鍛成可用的力量。</gray>"
      details:
        - "<gray>輝能之鏡：以日輝／月輝引動日月之祝福。</gray>"
      hint: "<gray>帶月輝核心回工房，製作輝能之鏡。</gray>"
    radiant_nexus:
      title: "<gold>輝能據點</gold>"
      lore:
        - "<gray>把流散的輝能，收攏進一座核心。</gray>"
      details:
        - "<gray>輝能核心：基地能量倉，可分享給夥伴。</gray>"
      hint: "<gray>建造輝能核心並右鍵信標核心啟動認領。</gray>"
    energy_grid:
      title: "<yellow>輝能網路</yellow>"
      lore:
        - "<gray>用中繼器把塔與核心串成一張網。</gray>"
      details:
        - "<gray>能量中繼器：延伸塔到核心的輸送距離。</gray>"
      hint: "<gray>在塔與核心之間建造能量中繼器並右鍵啟動。</gray>"
    facility_growth:
      title: "<white>設施的成長</white>"
      lore:
        - "<gray>把累積的輝能，回饋到基地本身。</gray>"
      details:
        - "<gray>用核心輝能把設施升到 Lv2。</gray>"
      hint: "<gray>在核心附近執行 /lycohism upgrade workshop。</gray>"

