  nexus:
    title: "<yellow>輝能核心<reset>"
    header: "<gold>輝能核心<reset>"
    header-lore:
      - "<gray>據點的輝能倉。<reset>"
      - "<gray>流程：<gold>日／月輝塔<reset>→<yellow>中繼器<reset>→<aqua>核心<reset>→升級設施。<reset>"
      - "<gray>擁有者：<white>{owner}<reset>｜成員：<white>{members}<reset><reset>"
      - "<dark_gray>用 /lycohism nexus share <玩家> 分享存取。<reset>"
    sun: "<gold>☀ 日輝<reset>"
