# Lycohism 文字設定
# 所有玩家看得到的文字都集中在這裡，方便改字、改語氣、改顏色，不需重新編譯。
# 格式為 MiniMessage：https://docs.advntr.dev/minimessage/format.html
#
# 注意：書本頁面是「淺色羊皮紙」底，請使用深色（black / dark_gray / dark_green /
# dark_purple / dark_aqua / dark_red …）才看得清楚，不要用 white / gray / yellow。

# ── GUI 介面外觀（所有設施選單共用，維持一致性）────────────────────────────
gui:
  filler-material: GRAY_STAINED_GLASS_PANE
  header-material: PINK_PETALS
  back-material: ARROW
  breadcrumb-separator: " ▸ "
  back: "<white>返回</white>"
  back-lore:
    - "<dark_gray>回到上一頁。</dark_gray>"

  common:
    requires: "<gray>需要：</gray>"
    cost-line: "<gray>· {item} <white>x{amount}</white></gray>"
    cost-hidden: "<dark_gray>· <obfuscated>未知素材</obfuscated> <gray>x{amount}</gray></dark_gray>"
    cost-hidden-hint: "<dark_gray>拿起未知素材後，名稱就會顯現。</dark_gray>"
    cost-plain: "{item} x{amount}"
    click-craft: "<yellow>點擊製作。</yellow>"
    click-repair: "<yellow>點擊修復。</yellow>"
    click-enchant: "<yellow>點擊附加經驗修補。</yellow>"
    click-cultivate: "<dark_gray>點擊培育。</dark_gray>"

  # 設施升級按鈕（三個設施共用）。
  facility:
    upgrade: "<gradient:#ffe9a8:#c0a8ff>升級這座設施 → Lv{level}</gradient>"
    # {structure} 升級結構名、{sun}/{moon} 核心輝能消耗。
    upgrade-lore:
      - "<gray>把設施蓋進它的<white>{structure}</white>剛性結構，才能升到 Lv2。</gray>"
      - "<gray>流程：<gold>日／月輝塔</gold>→<yellow>中繼器</yellow>→<aqua>輝能核心</aqua>→在此升級。</gray>"
      - "<gray>消耗核心 <gold>日輝 {sun}</gold>／<aqua>月輝 {moon}</aqua>。</gray>"
    # Lv2→Lv3：用蝕影守望者掉落的蝕輝結晶開啟，不需升級結構。{sun}/{moon} 核心輝能消耗。
    upgrade-lore-3:
      - "<gray>用<gradient:#ffd86b:#b07cff>蝕輝結晶</gradient>把設施升到 Lv3 — 三階。</gray>"
      - "<gray>結晶來自在<white>暮蝕之境</white>召喚並擊敗<white>蝕影守望者</white>。</gray>"
      - "<gray>消耗核心 <gold>日輝 {sun}</gold>／<aqua>月輝 {moon}</aqua>。</gray>"
    upgrade-action: "<yellow>站在升級結構旁＝升級；Lv3 則只要備齊蝕輝結晶與輝能即可。</yellow>"
    # 設施已達最高階（Lv3）時，升級按鈕位置改放這個屏障提示（v0.9.2 #2）。
    maxed: "<gradient:#ffd86b:#b07cff>已達最高階 — Lv3</gradient>"
    maxed-lore:
      - "<gray>這座設施已經調律到頂，沒有更高的階級了。</gray>"
      - "<dark_gray>三階的內容在升級結構旁（或用指令）才存取得到。</dark_gray>"

  workshop:
    root: "<dark_aqua>工房</dark_aqua>"
    broken: "<dark_gray>工房（損壞）</dark_gray>"
    tools-leaf: "<aqua>工具製作</aqua>"
    materials-leaf: "<aqua>建材加工</aqua>"
    tools-lore:
      - "<gray>製作完整顯示用途與成本的生活工具。</gray>"
    materials-lore:
      - "<gray>把常用建材整組轉換。</gray>"
    repair: "<yellow>修復工房</yellow>"
    repair-lore:
      - "<gray>工房需要修復才能運作。</gray>"
    status: "<aqua>工房狀態</aqua>"
    status-lore:
      - "<gray>等級 <white>{level}</white> / 3</gray>"
      - "<gray>可用：工具製作、建材加工、經驗修補。</gray>"
      - "<dark_gray>點擊在聊天欄查看完整內容。</dark_gray>"
    mending: "<gradient:#8fd3ff:#ffffff>雨息附魔</gradient>"
    mending-lore:
      - "<gray>替主手工具永久附加經驗修補。</gray>"
      - "<gray>另需消耗 <white>{levels}</white> 個經驗等級。</gray>"
    mending-lore-2:
      - "<gray>替主手工具永久附加經驗修補<gold>＋耐久 III</gold>。</gray>"
      - "<gray>另需消耗 <white>{levels}</white> 個經驗等級。</gray>"
      - "<dark_gray>升級工房強化。</dark_gray>"
    mending-lore-3:
      - "<gray>替主手工具永久附加經驗修補<gold>＋耐久 III</gold>。</gray>"
      - "<gray>再依類型附上<red>鋒利／力量／保護／效率</red>。</gray>"
      - "<gray>另需消耗 <white>{levels}</white> 個經驗等級。</gray>"
      - "<dark_gray>三階工房（蝕輝）戰鬥向強化。</dark_gray>"
    conversion: "<gray>{input} → {output}</gray>"
    conversion-n: "<gray>{input} → {output} ×{amount}</gray>"
    conversion-action: "<dark_gray>點擊轉換背包中的整組。</dark_gray>"
    output-name: "<aqua>{item}</aqua>"
    header-main: "<aqua>工房</aqua>"
    header-main-lore:
      - "<gray>修復後的加工據點。</gray>"
      - "<gray>選擇下方一項功能。</gray>"
    header-broken-lore:
      - "<gray>工房還在沉睡。</gray>"
      - "<gray>備齊材料，點擊修復喚醒它。</gray>"
    header-tools-lore:
      - "<gray>用自然之物製作生活工具。</gray>"
    header-materials-lore:
      - "<gray>把背包裡的建材整組轉換。</gray>"
    header-materials-lore-2:
      - "<gray>把背包裡的建材整組轉換。</gray>"
      - "<gold>升級工房：產量加倍，並解鎖更多加工。</gold>"

  study:
    root: "<dark_aqua>書房</dark_aqua>"
    sealed: "<dark_gray>書房（沉寂）</dark_gray>"
    header-main: "<aqua>書房</aqua>"
    header-main-lore:
      - "<gray>記錄你走過的調律之路。</gray>"
      - "<gray>選擇下方一項分類。</gray>"
    header-sealed-lore:
      - "<gray>散落的紀錄還沒有整理。</gray>"
      - "<gray>備齊材料，點擊整理書房。</gray>"
    repair: "<yellow>整理書房</yellow>"
    repair-lore:
      - "<gray>讓散落的自然紀錄重新有序。</gray>"
    # ── 分類（root 的三個入口）─────────────────────────────
    books-leaf: "<aqua>書冊</aqua>"
    books-lore:
      - "<gray>翻閱手冊、圖鑑與發現紀錄。</gray>"
    tools-leaf: "<light_purple>記憶器物</light_purple>"
    tools-lore:
      - "<gray>製作觀測與整理用的工具。</gray>"
    map-mark: "<gradient:#aaccff:#e0f0ff>標記最近能量塔</gradient>"
    map-mark-lore:
      - "<gray>給你一張鎖定的地圖，中心對準最近的能量塔。</gray>"
      - "<dark_gray>升級書房解鎖。</dark_gray>"
    map-mark-name: "<gradient:#aaccff:#e0f0ff>{name} 位置圖</gradient>"
    forecast: "<gradient:#ffd86b:#b07cff>全境預報</gradient>"
    forecast-lore:
      - "<gray>讀出此刻此地所有可採集的自然現象。</gray>"
      - "<dark_gray>三階書房（蝕輝）探索向強化。</dark_gray>"
    progress-leaf: "<aqua>調律之路</aqua>"
    progress-lore:
      - "<gray>回顧走過的路，看見下一步。</gray>"
    expedition-leaf: "<gradient:#8fd3ff:#d9f3ff>遠征</gradient>"
    expedition-lore:
      - "<gray>解鎖並直接前往遠征地。</gray>"
    header-books-lore:
      - "<gray>翻閱你累積的調律紀錄。</gray>"
    header-tools-lore:
      - "<gray>用自然之物製作記憶工具。</gray>"
    header-expedition-lore:
      - "<gray>循著雨痕，前往主世界之外。</gray>"
    # ── 書冊 leaf ──────────────────────────────────────────
    manual: "<light_purple>調律手冊</light_purple>"
    manual-lore:
      - "<gray>查看目前能做的下一步。</gray>"
    compendium: "<aqua>自然圖鑑</aqua>"
    compendium-lore:
      - "<gray>查看已發現的自然現象。</gray>"
    record: "<green>發現紀錄</green>"
    record-lore:
      - "<gray>回顧你完成過的調律。</gray>"
    # ── 遠征 leaf ──────────────────────────────────────────
    expedition-enter: "<gradient:#8fd3ff:#d9f3ff>進入雨後森林</gradient>"
    expedition-enter-name: "<gradient:#8fd3ff:#d9f3ff>前往 {name}</gradient>"
    expedition-locked-name: "<dark_gray>{name}（未解鎖）</dark_gray>"
    expedition-enter-lore:
      - "<gray>已解鎖。點擊直接進入遠征世界。</gray>"
      - "<dark_gray>不會給予額外入口道具。</dark_gray>"
    expedition-return: "<white>返回出發地</white>"
    expedition-return-lore:
      - "<gray>點擊返回進入遠征前的位置。</gray>"
    gate-locked: "<dark_gray>雨後森林（未解鎖）</dark_gray>"
    gate-locked-lore:
      - "<gray>雨痕還很微弱，入口尚未解鎖。</gray>"
      - "<gray>踏入<white>地獄</white>之後，再回來試試。</gray>"
    # 暮蝕之境是日月兩線的收束點，鎖住時要明說解法，否則玩家不知道要先走完兩條遠征線。
    gate-locked-lore-eclipse_realm:
      - "<gray>日與月尚未在此相蝕，入口仍闔著。</gray>"
      - "<gray>先走過<gold>潮汐深淵</gold>（日）與<aqua>永夜荒原</aqua>（月）兩線，</gray>"
      - "<gray>兩道調律齊備，蝕境之門才會顯現。</gray>"
    status: "<aqua>書房狀態</aqua>"
    status-lore:
      - "<gray>等級 <white>{level}</white> / 3</gray>"
      - "<gray>分類：書冊、記憶器物、遠征。</gray>"
      - "<dark_gray>點擊在聊天欄查看完整內容。</dark_gray>"
  greenhouse:
    root: "<dark_aqua>溫室</dark_aqua>"
    broken: "<dark_gray>溫室（荒蕪）</dark_gray>"
    cultivate-leaf: "<green>培育</green>"
    tools-leaf: "<green>植物工具</green>"
    cultivate-lore:
      - "<gray>用花脈換取常用與稀有植物。</gray>"
    tools-lore:
      - "<gray>製作能催熟、採收與補種的植物工具。</gray>"
    repair: "<yellow>開墾溫室</yellow>"
    repair-lore:
      - "<gray>讓荒蕪的溫室重新適合生長。</gray>"
    status: "<green>溫室狀態</green>"
    status-lore:
      - "<gray>等級 <white>{level}</white> / 3</gray>"
      - "<gray>可用：花脈與苔華培育、花脈剪、苔露膏與苔肥。</gray>"
      - "<dark_gray>點擊在聊天欄查看完整內容。</dark_gray>"
    output-name: "<green>{item} x{amount}</green>"
    header-main: "<green>溫室</green>"
    header-main-lore:
      - "<gray>讓植物與花脈在此安頓。</gray>"
      - "<gray>選擇下方一項功能。</gray>"
    header-broken-lore:
      - "<gray>溫室還很荒蕪。</gray>"
      - "<gray>備齊材料，點擊開墾。</gray>"
    header-cultivate-lore:
      - "<gray>用花脈培育植物素材。</gray>"
    header-tools-lore:
      - "<gray>製作植物系工具。</gray>"

  admin:
    title: "<dark_purple>Lycohism 管理員</dark_purple>"
    header: "<light_purple>管理員工具</light_purple>"
    header-lore:
      - "<gray>版本 <white>{version}</white>｜Debug {debug}</gray>"
      - "<gray>集中處理測試物品、階段與遠征。</gray>"
    materials: "<aqua>給予自然素材</aqua>"
    materials-lore:
      - "<gray>挑選一份 Lycohism 自然素材。</gray>"
    tools: "<light_purple>給予工具</light_purple>"
    tools-lore:
      - "<gray>挑選一件工具或測試物品。</gray>"
    stages: "<yellow>調整遊戲階段</yellow>"
    stages-lore:
      - "<gray>把指定章節設成目前進度。</gray>"
    expedition: "<gradient:#8fd3ff:#d9f3ff>切換遠征世界</gradient>"
    expedition-lore:
      - "<gray>無視解鎖門檻進入；已在遠征時返回。</gray>"
    reload: "<green>重新載入設定</green>"
    reload-lore:
      - "<gray>重新讀取設定、內容與進度。</gray>"
    facilities: "<aqua>設施等級</aqua>"
    facilities-lore:
      - "<gray>快速設定你自己的設施等級，測試修復／升級／Lv2 內容。</gray>"
    facilities-header-lore:
      - "<gray>點擊循環該設施等級（0→1→2→3→0）。</gray>"
    facility-level: "<gray>目前等級：<white>{level}</white> / 3</gray>"
    click-facility: "<yellow>點擊切換等級。</yellow>"
    sounds: "<aqua>音效測試集</aqua>"
    sounds-lore:
      - "<gray>試聽四組音階盒旋律。</gray>"
    sounds-header-lore:
      - "<gray>每組使用同一段音階，方便比較音色。</gray>"
    sound-chime: "<light_purple>水晶鐘</light_purple>"
    sound-harp: "<gold>豎琴</gold>"
    sound-flute: "<green>長笛</green>"
    sound-bell: "<yellow>鐘聲</yellow>"
    click-sound:
      - "<yellow>點擊試聽。</yellow>"
    items-header-lore:
      - "<gray>點擊物品，直接取得一份。</gray>"
    stages-header-lore:
      - "<gray>點擊章節，把它設為目前階段。</gray>"
      - "<dark_gray>發光的羅盤是目前階段。</dark_gray>"
    item-id: "<dark_gray>ID：{id}</dark_gray>"
    stage-id: "<dark_gray>階段 ID：{id}</dark_gray>"
    click-give: "<yellow>點擊取得。</yellow>"
    click-stage: "<yellow>點擊切換。</yellow>"
    expedition-header-lore:
      - "<gray>挑一個遠征世界直接前往（無視門檻）。</gray>"
    expedition-id: "<dark_gray>遠征 ID：{id}</dark_gray>"
    click-expedition: "<yellow>點擊前往。</yellow>"
    expedition-return: "<white>返回主世界</white>"
    expedition-return-lore:
      - "<gray>若正在遠征世界，點擊返回出發地。</gray>"

  nexus:
    title: "<gradient:#ffe9a8:#c0a8ff>輝能核心</gradient>"
    header: "<gold>輝能核心</gold>"
    header-lore:
      - "<gray>據點的輝能倉。</gray>"
      - "<gray>流程：<gold>日／月輝塔</gold>→<yellow>中繼器</yellow>→<aqua>核心</aqua>→升級設施。</gray>"
      - "<gray>擁有者：<white>{owner}</white>｜成員：<white>{members}</white></gray>"
      - "<dark_gray>用 /lycohism nexus share <玩家> 分享存取。</dark_gray>"
    sun: "<gold>☀ 日輝</gold>"
    sun-lore:
      - "<gray>存量 <white>{value}</white> / {cap}</gray>"
      - "<dark_gray>由日輝塔經中繼器灌入。</dark_gray>"
    moon: "<aqua>☾ 月輝</aqua>"
    moon-lore:
      - "<gray>存量 <white>{value}</white> / {cap}</gray>"
      - "<dark_gray>由月輝塔經中繼器灌入。</dark_gray>"

  # 調律之路（progression line）的獨立 UI。
  progression:
    title: "<dark_aqua>調律之路</dark_aqua>"
    header: "<aqua>調律之路</aqua>"
    header-lore:
      - "<gray>你走過的路，與下一步。</gray>"
      - "<gray>已完成 <white>{done}</white> / {total}</gray>"
    advancement-root-title: "Lycohism"
    advancement-root-description: "自然調律的物語。"
    advancement-intro-title: "你所知道的物語"
    advancement-intro-description: "世界裡仍有你尚未察覺的自然回應。"
    done-name: "<green>✔ {title}</green>"
    unlocked-label: "<aqua>已解鎖：</aqua>"
    current-name: "<yellow>▶ {title}</yellow>"
    objective-label: "<gold>目前目標：</gold>"
    locked-name: "<dark_gray>？？？</dark_gray>"
    locked-lore:
      - "<dark_gray>還沒走到這一步。</dark_gray>"
    upcoming-name: "<dark_gray>⌛ {title}</dark_gray>"

