# Lycohism 文字設定
# 所有玩家看得到的文字都集中在這裡，方便改字、改語氣、改顏色，不需重新編譯。
# 格式為 MiniMessage（自製解析器，支援 Spigot 1.16+）：<color>、<bold>、<reset>、<gradient:c1:c2>text</gradient>
#
# 注意：書本頁面是「淺色羊皮紙」底，請使用深色（black / dark_gray / dark_green /
# dark_purple / dark_aqua / dark_red …）才看得清楚，不要用 white / gray / yellow。

# ── GUI 介面外觀（所有設施選單共用，維持一致性）────────────────────────────
gui:
  filler-material: GRAY_STAINED_GLASS_PANE
  header-material: PINK_PETALS
  back-material: ARROW
  breadcrumb-separator: " ▸ "
  back: "<white>返回<reset>"
  back-lore:
    - "<dark_gray>回到上一頁。<reset>"

  common:
    requires: "<gray>需要：<reset>"
    cost-line: "<gray>· {item} <white>x{amount}<reset><reset>"
    cost-hidden: "<dark_gray>· <obfuscated>未知素材<reset> <gray>x{amount}<reset><reset>"
    cost-hidden-hint: "<dark_gray>拿起未知素材後，名稱就會顯現。<reset>"
    cost-plain: "{item} x{amount}"
    click-craft: "<yellow>點擊製作。<reset>"
    click-repair: "<yellow>點擊修復。<reset>"
    click-enchant: "<yellow>點擊附加經驗修補。<reset>"
    click-cultivate: "<dark_gray>點擊培育。<reset>"

  # 設施升級按鈕（三個設施共用）。
  facility:
    upgrade: "<yellow>升級這座設施 → Lv{level}<reset>"
    # {structure} 升級結構名、{sun}/{moon} 核心輝能消耗。
    upgrade-lore:
      - "<gray>把設施蓋進它的<white>{structure}<reset>剛性結構，才能升到 Lv2。<reset>"
      - "<gray>流程：<gold>日／月輝塔<reset>→<yellow>中繼器<reset>→<aqua>輝能核心<reset>→在此升級。<reset>"
      - "<gray>消耗核心 <gold>日輝 {sun}<reset>／<aqua>月輝 {moon}<reset>。<reset>"
    # Lv2→Lv3：用蝕影守望者掉落的蝕輝結晶開啟，不需升級結構。{sun}/{moon} 核心輝能消耗。
    upgrade-lore-3:
      - "<gray>用<yellow>蝕輝結晶<reset>把設施升到 Lv3 — 三階。<reset>"
      - "<gray>結晶來自在<white>暮蝕之境<reset>召喚並擊敗<white>蝕影守望者<reset>。<reset>"
      - "<gray>消耗核心 <gold>日輝 {sun}<reset>／<aqua>月輝 {moon}<reset>。<reset>"
    upgrade-action: "<yellow>站在升級結構旁＝升級；Lv3 則只要備齊蝕輝結晶與輝能即可。<reset>"
    # 設施已達最高階（Lv3）時，升級按鈕位置改放這個屏障提示（v0.9.2 #2）。
    maxed: "<yellow>已達最高階 — Lv3<reset>"
    maxed-lore:
      - "<gray>這座設施已經調律到頂，沒有更高的階級了。<reset>"
      - "<dark_gray>三階的內容在升級結構旁（或用指令）才存取得到。<reset>"

  workshop:
    root: "<dark_aqua>工房<reset>"
    broken: "<dark_gray>工房（損壞）<reset>"
    tools-leaf: "<aqua>工具製作<reset>"
    materials-leaf: "<aqua>建材加工<reset>"
    tools-lore:
      - "<gray>製作完整顯示用途與成本的生活工具。<reset>"
    materials-lore:
      - "<gray>把常用建材整組轉換。<reset>"
    repair: "<yellow>修復工房<reset>"
    repair-lore:
      - "<gray>工房需要修復才能運作。<reset>"
    status: "<aqua>工房狀態<reset>"
    status-lore:
      - "<gray>等級 <white>{level}<reset> / 3<reset>"
      - "<gray>可用：工具製作、建材加工、經驗修補。<reset>"
      - "<dark_gray>點擊在聊天欄查看完整內容。<reset>"
    mending: "<aqua>雨息附魔<reset>"
    mending-lore:
      - "<gray>替主手工具永久附加經驗修補。<reset>"
      - "<gray>另需消耗 <white>{levels}<reset> 個經驗等級。<reset>"
    mending-lore-2:
      - "<gray>替主手工具永久附加經驗修補<gold>＋耐久 III<reset>。<reset>"
      - "<gray>另需消耗 <white>{levels}<reset> 個經驗等級。<reset>"
      - "<dark_gray>升級工房強化。<reset>"
    mending-lore-3:
      - "<gray>替主手工具永久附加經驗修補<gold>＋耐久 III<reset>。<reset>"
      - "<gray>再依類型附上<red>鋒利／力量／保護／效率<reset>。<reset>"
      - "<gray>另需消耗 <white>{levels}<reset> 個經驗等級。<reset>"
      - "<dark_gray>三階工房（蝕輝）戰鬥向強化。<reset>"
    conversion: "<gray>{input} → {output}<reset>"
    conversion-n: "<gray>{input} → {output} ×{amount}<reset>"
    conversion-action: "<dark_gray>點擊轉換背包中的整組。<reset>"
    output-name: "<aqua>{item}<reset>"
    header-main: "<aqua>工房<reset>"
    header-main-lore:
      - "<gray>修復後的加工據點。<reset>"
      - "<gray>選擇下方一項功能。<reset>"
    header-broken-lore:
      - "<gray>工房還在沉睡。<reset>"
      - "<gray>備齊材料，點擊修復喚醒它。<reset>"
    header-tools-lore:
      - "<gray>用自然之物製作生活工具。<reset>"
    header-materials-lore:
      - "<gray>把背包裡的建材整組轉換。<reset>"
    header-materials-lore-2:
      - "<gray>把背包裡的建材整組轉換。<reset>"
      - "<gold>升級工房：產量加倍，並解鎖更多加工。<reset>"

  study:
    root: "<dark_aqua>書房<reset>"
    sealed: "<dark_gray>書房（沉寂）<reset>"
    header-main: "<aqua>書房<reset>"
    header-main-lore:
      - "<gray>記錄你走過的調律之路。<reset>"
      - "<gray>選擇下方一項分類。<reset>"
    header-sealed-lore:
      - "<gray>散落的紀錄還沒有整理。<reset>"
      - "<gray>備齊材料，點擊整理書房。<reset>"
    repair: "<yellow>整理書房<reset>"
    repair-lore:
      - "<gray>讓散落的自然紀錄重新有序。<reset>"
    # ── 分類（root 的三個入口）─────────────────────────────
    books-leaf: "<aqua>書冊<reset>"
    books-lore:
      - "<gray>翻閱手冊、圖鑑與發現紀錄。<reset>"
    tools-leaf: "<light_purple>記憶器物<reset>"
    tools-lore:
      - "<gray>製作觀測與整理用的工具。<reset>"
    map-mark: "<gray>標記最近能量塔<reset>"
    map-mark-lore:
      - "<gray>給你一張鎖定的地圖，中心對準最近的能量塔。<reset>"
      - "<dark_gray>升級書房解鎖。<reset>"
    map-mark-name: "<gray>{name} 位置圖<reset>"
    forecast: "<yellow>全境預報<reset>"
    forecast-lore:
      - "<gray>讀出此刻此地所有可採集的自然現象。<reset>"
      - "<dark_gray>三階書房（蝕輝）探索向強化。<reset>"
    progress-leaf: "<aqua>調律之路<reset>"
    progress-lore:
      - "<gray>回顧走過的路，看見下一步。<reset>"
    expedition-leaf: "<aqua>遠征<reset>"
    expedition-lore:
      - "<gray>解鎖並直接前往遠征地。<reset>"
    header-books-lore:
      - "<gray>翻閱你累積的調律紀錄。<reset>"
    header-tools-lore:
      - "<gray>用自然之物製作記憶工具。<reset>"
    header-expedition-lore:
      - "<gray>循著雨痕，前往主世界之外。<reset>"
    # ── 書冊 leaf ──────────────────────────────────────────
    manual: "<light_purple>調律手冊<reset>"
    manual-lore:
      - "<gray>查看目前能做的下一步。<reset>"
    compendium: "<aqua>自然圖鑑<reset>"
    compendium-lore:
      - "<gray>查看已發現的自然現象。<reset>"
    record: "<green>發現紀錄<reset>"
    record-lore:
      - "<gray>回顧你完成過的調律。<reset>"
    # ── 遠征 leaf ──────────────────────────────────────────
    expedition-enter: "<aqua>進入雨後森林<reset>"
    expedition-enter-name: "<aqua>前往 {name}<reset>"
    expedition-locked-name: "<dark_gray>{name}（未解鎖）<reset>"
    expedition-enter-lore:
      - "<gray>已解鎖。點擊直接進入遠征世界。<reset>"
      - "<dark_gray>不會給予額外入口道具。<reset>"
    expedition-return: "<white>返回出發地<reset>"
    expedition-return-lore:
      - "<gray>點擊返回進入遠征前的位置。<reset>"
    gate-locked: "<dark_gray>雨後森林（未解鎖）<reset>"
    gate-locked-lore:
      - "<gray>雨痕還很微弱，入口尚未解鎖。<reset>"
      - "<gray>踏入<white>地獄<reset>之後，再回來試試。<reset>"
    # 暮蝕之境是日月兩線的收束點，鎖住時要明說解法，否則玩家不知道要先走完兩條遠征線。
    gate-locked-lore-eclipse_realm:
      - "<gray>日與月尚未在此相蝕，入口仍闔著。<reset>"
      - "<gray>先走過<gold>潮汐深淵<reset>（日）與<aqua>永夜荒原<reset>（月）兩線，<reset>"
      - "<gray>兩道調律齊備，蝕境之門才會顯現。<reset>"
    status: "<aqua>書房狀態<reset>"
    status-lore:
      - "<gray>等級 <white>{level}<reset> / 3<reset>"
      - "<gray>分類：書冊、記憶器物、遠征。<reset>"
      - "<dark_gray>點擊在聊天欄查看完整內容。<reset>"
