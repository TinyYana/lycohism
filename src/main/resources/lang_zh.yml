# 每個自動化機器的功能描述（供藍圖物品 lore 注入 + 右鍵狀態顯示）。
content-descriptions:
  attunement_engine:
    - "<gray>耗<gold>日輝<reset>：石材加工（鵝卵石→石頭→石磚、沙→砂石、花崗岩→磨製花崗岩等）。<reset>"
    - "<gray>耗<aqua>月輝<reset>：深岩加工（深板岩→深板岩磚、鵝卵石深板岩→磨製深板岩、黑石→磨製黑石等）。<reset>"
    - "<dark_gray>蓋好後右鍵高爐控制器認領；機器正上方放箱子當原料倉。<reset>"
  seedling_cultivator:
    - "<gray>耗<aqua>月輝<reset>：植物加工（仙人掌→綠色染料×2、甘蔗→砂糖×2、海帶→乾海帶×2、骨粉→骨頭）。<reset>"
    - "<dark_gray>蓋好後右鍵堆肥桶控制器認領；機器正上方放箱子當植物素材倉。<reset>"
  phenomenon_condenser:
    - "<gray>耗<aqua>月輝<reset>：素材凝縮（腐肉→皮革、紙→書、墨囊→黑色染料×2、火藥棒→火藥粉×4、螢石粉→螢石）。<reset>"
    - "<dark_gray>蓋好後右鍵講台控制器認領；機器正上方放箱子當素材倉。<reset>"
  infernal_relay:
    - "<gray>地獄深處的古老廢址，魂靈焰火仍在燃燒。<reset>"
    - "<dark_gray>右鍵魂靈焰火認領；認領後可建造燼華鍛爐提煉焰輝碎片。<reset>"
  ember_forge:
    - "<gray>耗<gold>日輝<reset>：以燼華催化烈焰棒＋地獄疣，精煉焰輝碎片×3。<reset>"
    - "<dark_gray>蓋好後空手右鍵中央熔岩塊查看用法；正下方地獄磚9塊基座＋四角磨製黑石磚柱。<reset>"

structures:
  tidal-shrine:
    chest-name: "<aqua>潮汐神殿的祭品<reset>"
  moss-altar:
    chest-name: "<dark_green>苔生調律壇的供物<reset>"
  dew-well:
    chest-name: "<aqua>露語井的沉積物<reset>"
  wind-circle:
    chest-name: "<gray>風痕石環的藏物<reset>"
  rainfall-dungeon:
    chest-name: "<dark_aqua>雨浸地窖的補給箱<reset>"
  moondial:
    chest-name: "<light_purple>月晷下的供奉<reset>"
  sundial:
    chest-name: "<gold>日晷下的供奉<reset>"
  sealed-shrine:
    chest-name: "<gray>封印祠的遺藏<reset>"

items:
  dew_light:
    name: "<white>露光瓶<reset>"
    lore:
      - "<gray>在黑暗中提供兩分鐘夜視。<reset>"
      - "<dark_gray>右鍵消耗；使用後留下空玻璃瓶。<reset>"
  flower_bookmark:
    name: "<white>花籤<reset>"
    lore:
      - "<gray>記住一個地方，之後指引方向。<reset>"
      - "<dark_gray>Shift右鍵記住、右鍵指引。<reset>"
  stonework_hammer:
    name: "<white>石工槌<reset>"
    lore:
      - "<gray>讓石材加工更方便。<reset>"
      - "<dark_gray>第一次右鍵預覽，5 秒內再次右鍵確認。<reset>"
  stonework_hammer_tier_2:
    name: "<yellow>二階石工槌<reset>"
    lore:
      - "<gray>右鍵石材，一次塑形相連平面的 3×3 範圍。<reset>"
      - "<dark_gray>第一次右鍵預覽，再次右鍵確認 3×3 塑形。<reset>"
  building_wand:
    name: "<white>築造杖<reset>"
    lore:
      - "<gray>第一次右鍵預覽，5 秒內再次右鍵確認直線放置。<reset>"
      - "<dark_gray>從背包消耗相同的原版方塊；在輝能祭壇煉成。<reset>"
  building_wand_tier_2:
    name: "<aqua>二階築造杖<reset>"
    lore:
      - "<gray>第一次右鍵預覽，再次右鍵確認放置。<reset>"
      - "<gray>Shift右鍵（對空亦可）切換：直線／牆面／地板／柱列。<reset>"
      - "<dark_gray>從背包消耗相同的原版方塊。<reset>"
  rain_bandage:
    name: "<aqua>雨紋繃帶<reset>"
    lore:
      - "<gray>用雨息浸潤的簡單繃帶。<reset>"
      - "<dark_gray>右鍵恢復少量生命，使用後消耗。<reset>"
  flower_vein_shears:
    name: "<light_purple>花脈剪<reset>"
    lore:
      - "<gray>讓未成熟作物立刻長成。<reset>"
      - "<dark_gray>成熟後再右鍵可採收並補種。<reset>"
  wind_vane:
    name: "<white>風標<reset>"
    lore:
      - "<gray>讀取此刻的自然採集條件。<reset>"
      - "<dark_gray>拿在任一手時，持續顯示環境讀數。<reset>"
  moon_pouch:
    name: "<white>月紗袋<reset>"
    lore:
      - "<gray>自動收納撿到的自然現象。<reset>"
      - "<dark_gray>右鍵取出袋內全部內容。<reset>"
  leyline_probe:
    name: "<gray>地脈探針<reset>"
    lore:
      - "<gray>讓地脈砂回應附近的礦脈。<reset>"
      - "<dark_gray>拿在任一手時，持續顯示最近礦脈。<reset>"
  rain_gate:
    name: "<aqua>雨痕門符<reset>"
    lore:
      - "<gray>循著雨痕，前往下著雨的森林。<reset>"
      - "<dark_gray>主世界右鍵前往，遠征世界右鍵返回原地。<reset>"
      - "<dark_gray>需先踏入過地獄，雨痕才會回應。<reset>"
  moss_balm:
    name: "<gray>苔露膏<reset>"
    lore:
      - "<gray>右鍵塗抹，獲得一段溫和的持續再生。<reset>"
      - "<dark_gray>只能用雨後森林的苔華在溫室調製。<reset>"
  moss_fertile:
    name: "<gray>苔肥<reset>"
    lore:
      - "<gray>右鍵植物，催長周圍一小塊作物與植被。<reset>"
      - "<dark_gray>只能用雨後森林的苔華在溫室調製。<reset>"
  energy_crystal:
    name: "<yellow>蓄能晶<reset>"
    lore:
      - "<gray>放在背包就會吸收滿溢的輝能。<reset>"
      - "<gray>你的能量池滿了之後，多的會存進這裡。<reset>"
      - "<dark_gray>右鍵把晶體裡的能量倒回自身的輝能池。<reset>"
  radiant_focus:
    name: "<yellow>輝能之鏡<reset>"
    lore:
      - "<gray>右鍵引動<gold>日輝<reset>：抗火與力量的日之祝福。<reset>"
      - "<gray>Shift右鍵引動<aqua>月輝<reset>：夜視與緩降的月之祝福。<reset>"
      - "<dark_gray>在輝能祭壇以金錠＋月輝核心＋蓄能晶煉成。<reset>"
  solar_pick:
    name: "<yellow>日炎鎬<reset>"
    lore:
      - "<gray>右鍵消耗<gold>日輝<reset>，獲得一段挖掘加速。<reset>"
      - "<dark_gray>工房 Lv2 解鎖。<reset>"
  star_compass:
    name: "<gray>星圖羅盤<reset>"
    lore:
      - "<gray>右鍵指出最近<aqua>能量塔<reset>的方向與距離。<reset>"
      - "<dark_gray>書房（Lv1）製作。<reset>"
  lunar_spore:
    name: "<white>月華灑<reset>"
    lore:
      - "<gray>右鍵植物，消耗<aqua>月輝<reset>對一片區域施骨粉。<reset>"
      - "<dark_gray>溫室 Lv2 解鎖。<reset>"
  blueprint:
    name: "<aqua>{structure} 藍圖<reset>"
    lore:
      - "<gray>看向地面右鍵：顯示<green>幽靈輪廓<reset>（綠=有、紅=缺）。<reset>"
      - "<gray>Shift右鍵：用背包材料<white>直接建造<reset>。<reset>"
      - "<dark_gray>建造 {structure} 的設計圖。<reset>"
    materials: "<white>需要方塊：<reset>"
    material-line: "<gray>• {material} ×{count}<reset>"

# 調律之路各章節文案（對應 progression.yml 的 stage id）。
progression:
  stages:
    awakening:
      title: "<white>初遇晨露<reset>"
      lore:
        - "<gray>清晨的第一滴自然之力。<reset>"
      details:
        - "<gray>晨露採集與初階自然配方。<reset>"
      hint: "<gray>清晨在草地、花叢間採集晨露。<reset>"
    workshop:
      title: "<white>喚醒工房<reset>"
      lore:
        - "<gray>讓基地長出第一個功能。<reset>"
      details:
        - "<gray>工具製作、建材加工與雨息附魔。<reset>"
      hint: "<gray>備齊材料，在工作台修復工房。<reset>"
    first_tools:
      title: "<white>第一件生活工具<reset>"
      lore:
        - "<gray>自然開始替你解決生存的小麻煩。<reset>"
      details:
        - "<gray>露光瓶：消耗後獲得兩分鐘夜視。<reset>"
      hint: "<gray>在工房用晨露做出露光瓶。<reset>"
    rain:
      title: "<white>雨的氣息<reset>"
      lore:
        - "<gray>雨天不再只是等待。<reset>"
      details:
        - "<gray>採集雨息，催長作物並製作恢復用品。<reset>"
      hint: "<gray>雨天在水邊與森林採集雨息。<reset>"
    study:
      title: "<white>翻開書房<reset>"
      lore:
        - "<gray>開始記錄你走過的路。<reset>"
      details:
        - "<gray>手冊、圖鑑、發現紀錄與調律之路。<reset>"
      hint: "<gray>備齊材料，整理書房。<reset>"
    greenhouse:
      title: "<white>溫室生機<reset>"
      lore:
        - "<gray>植物與農業有了著落。<reset>"
      details:
        - "<gray>植物培育、花脈剪、苔露膏與苔肥。<reset>"
      hint: "<gray>備齊材料，開墾溫室。<reset>"
    night:
      title: "<white>夜的記憶<reset>"
      lore:
        - "<gray>夜晚與月色值得停留。<reset>"
      details:
        - "<gray>月露，以及風標與月紗袋的製作。<reset>"
      hint: "<gray>晴朗的滿月夜採集月露。<reset>"
    nether_gate:
      title: "<white>通往地獄<reset>"
      lore:
        - "<gray>更遠的路，需要更深的足跡。<reset>"
      details:
        - "<gray>書房中的雨後森林入口。<reset>"
      hint: "<gray>踏入地獄一次，書房的遠征入口便會解鎖。<reset>"
    infernal_relay:
      title: "<red>地獄廢址<reset>"
      lore:
        - "<gray>古老的中繼廢址，魂靈焰火仍在燃燒。<reset>"
      details:
        - "<gray>在地獄深處尋找鑿裂地獄磚平台＋四角牆柱＋中央魂靈焰火的廢址。<reset>"
        - "<gray>右鍵中央魂靈焰火認領廢址；此後可在輝能祭壇以燼華提煉焰輝碎片。<reset>"
      hint: "<gray>深入地獄，尋找仍燃燒著魂靈焰火的古老廢址。<reset>"
    ember_forge:
      title: "<red>燼華鍛爐<reset>"
      lore:
        - "<gray>地獄礦物的煉製需要更深的火。<reset>"
      details:
        - "<gray>燼華鍛爐：地獄磚9塊基座＋四角磨製黑石磚柱＋中央熔岩塊控制器。<reset>"
        - "<gray>手持燼華右鍵熔岩塊，以烈焰棒＋地獄疣消耗日輝提煉焰輝碎片。<reset>"
      hint: "<gray>建造燼華鍛爐（地獄磚3×3基座＋四角磨製黑石磚柱＋中央熔岩塊），空手右鍵查看配方。<reset>"
    radiant_vein:
      title: "<gold>地獄輝脈<reset>"
      lore:
        - "<gray>金紋黑石裡，藏著本世界沒有的結晶。<reset>"
      details:
        - "<gray>輝脈晶：Lycohism 專屬礦物，用於二階工具與祭壇造物。<reset>"
      hint: "<gray>探索新生成的地獄區塊，挖掘岩層中的金紋黑石礦脈。<reset>"
    expedition:
      title: "<white>第一次遠征<reset>"
      lore:
        - "<gray>走出主世界，去雨後的森林。<reset>"
      details:
        - "<gray>雨後森林與專屬素材苔華。<reset>"
      hint: "<gray>從書房的遠征介面前往雨後森林。<reset>"
    expedition_yield:
      title: "<white>帶回的禮物<reset>"
      lore:
        - "<gray>遠征的收穫，化成只有那裡才有的東西。<reset>"
      details:
        - "<gray>用苔華調製苔露膏與苔肥。<reset>"
      hint: "<gray>用苔華在溫室調製苔露膏。<reset>"
    radiance:
      title: "<white>輝能初現<reset>"
      lore:
        - "<gray>日與月的光，開始能被收攏。<reset>"
      details:
        - "<gray>蓄能晶；在天空下被動蓄日輝與月輝。<reset>"
      hint: "<gray>在工房製作蓄能晶，到戶外站在天空下蓄能。<reset>"
    solar_tower:
      title: "<gold>日之塔<reset>"
      lore:
        - "<gray>循著日光，尋找第一座高塔。<reset>"
      details:
        - "<gray>日輝塔：高聳的剛性地標，白天見天時供應日輝。<reset>"
      hint: "<gray>在世界各地尋找自然生成的<gold>日晷（日輝塔）<reset>；靠近它就會被記錄。（管理員可 /lycohism build sun_tower 生成）<reset>"
    lunar_tower:
      title: "<aqua>月之塔<reset>"
      lore:
        - "<gray>循著月色，尋找對應的高塔。<reset>"
      details:
        - "<gray>月輝塔：與日輝塔對稱，夜晚見天時供應月輝。<reset>"
      hint: "<gray>尋找自然生成的<aqua>月晷（月輝塔）<reset>，靠近它就會被記錄；永夜荒原與主世界都可能出現。<reset>"
    lunar_waste:
      title: "<white>踏入永夜<reset>"
      lore:
        - "<gray>沒有黎明的荒原，是月之力的源頭。<reset>"
      details:
        - "<gray>永夜荒原：整日可蓄月輝、月輝核心的產地。<reset>"
      hint: "<gray>從書房遠征介面前往永夜荒原。<reset>"
    energy_altar:
      title: "<white>輝能祭壇<reset>"
      lore:
        - "<gray>立一座祭壇，高階煉製從此開始。<reset>"
      details:
        - "<gray>輝能祭壇：丟素材、手持催化物右鍵、消耗輝能煉成。<reset>"
      hint: "<gray>建造輝能祭壇（中央附魔台＋一圈深板岩台座），空手右鍵祭壇可查看用法與配方。<reset>"
    moon_attunement:
      title: "<white>月之調律<reset>"
      lore:
        - "<gray>把帶回的月輝核心，鍛成可用的力量。<reset>"
      details:
        - "<gray>輝能之鏡：在祭壇以日輝／月輝引動日月之祝福。<reset>"
      hint: "<gray>在輝能祭壇手持金錠、丟入月輝核心與蓄能晶，消耗日月輝煉成輝能之鏡。<reset>"
    tidal_depths:
      title: "<dark_aqua>潛入暖海<reset>"
      lore:
        - "<gray>永晝的海，是日之力的源頭。<reset>"
      details:
        - "<gray>潮汐深淵：白天蓄日輝加倍、日輝核心的產地（對位永夜荒原）。<reset>"
      hint: "<gray>從書房遠征介面前往潮汐深淵。<reset>"
    solar_attunement:
      title: "<yellow>日之調律<reset>"
      lore:
        - "<gray>把帶回的日輝核心，鍛成可用的力量。<reset>"
      details:
        - "<gray>日炎鎬：以日輝引動急迫，日線與月之調律對位。<reset>"
      hint: "<gray>升級工房後，在工房製作日炎鎬。<reset>"
    radiant_nexus:
      title: "<gold>輝能據點<reset>"
      lore:
        - "<gray>把流散的輝能，收攏進一座核心。<reset>"
      details:
        - "<gray>輝能核心：基地能量倉，可分享給夥伴。<reset>"
        - "<gray>能量流向：<gold>日／月輝塔<reset>（產能）→<yellow>中繼器<reset>（接力）→<aqua>核心<reset>（儲存）。<reset>"
      hint: "<gray>建造輝能核心並右鍵信標核心啟動認領；把它蓋在塔水平 48 格內，能量就會流進來（靠近會看到光束）。<reset>"
    energy_grid:
      title: "<yellow>輝能網路<reset>"
      lore:
        - "<gray>用中繼器把塔與核心串成一張網。<reset>"
      details:
        - "<gray>能量中繼器：每段 48 格把塔的能量接力到更遠的核心。<reset>"
        - "<gray>塔只在對應時段（日塔白天／月塔夜晚）＋見天時產能。<reset>"
      hint: "<gray>塔離核心太遠時，在中間建造能量中繼器並右鍵啟動；靠近時會看到流動的光束代表能量在走。<reset>"
    facility_growth:
      title: "<white>設施的成長<reset>"
      lore:
        - "<gray>把累積的輝能，回饋到基地本身。<reset>"
      details:
        - "<gray>升級＝蓋出設施的「升級結構」＋消耗核心輝能。<reset>"
        - "<gray>之後在升級結構旁或用指令開啟，即享 Lv2 完整功能。<reset>"
      hint: "<gray>把工房／書房／溫室蓋進對應的升級結構，在旁邊開設施頁點「升級」（或 /lycohism upgrade）。<reset>"
    attunement_engine:
      title: "<white>自動調律機<reset>"
      lore:
        - "<gray>讓基地接手重複的建材加工。<reset>"
      details:
        - "<gray>在輝能核心附近蓋出自動調律機（藍圖於工房 Lv2 製作），右鍵中央高爐認領。<reset>"
        - "<gray>正上方放箱子當原料倉；它每隔幾秒取一份原料、耗核心日輝、把成品放回箱子。<reset>"
      hint: "<gray>到工房 Lv2 製作「自動調律機藍圖」，在核心 48 格內蓋好、右鍵高爐認領，正上方放個箱子丟入鵝卵石。<reset>"

    eclipse_realm:
      title: "<dark_gray>暮蝕之境<reset>"
      lore:
        - "<gray>日與月的兩條路，在蝕中交會。<reset>"
      details:
        - "<gray>走過「日」的潮汐深淵與「月」的永夜荒原，蝕的章節才開啟。<reset>"
        - "<gray>第三遠征地：陰暗的黃昏，戰場與日月儀已自然成形。<reset>"
      hint: "<gray>先走過潮汐深淵與永夜荒原，再從書房前往<white>暮蝕之境<reset>。<reset>"

    eclipse_warden:
      title: "<yellow>蝕影守望者<reset>"
      lore:
        - "<gray>蝕落下時，守望者甦醒。<reset>"
      details:
        - "<gray>在暮蝕之境的日月儀，手持<gold>日輝核心<reset>＋<aqua>月輝核心<reset>右鍵核心即可召喚。<reset>"
        - "<gray>擊敗後掉落<yellow>蝕輝結晶<reset>——三階設施的鑰匙。<reset>"
      hint: "<gray>在暮蝕之境召喚並擊敗蝕影守望者，取得蝕輝結晶。<reset>"

    seedling_cultivator:
      title: "<white>育苗機<reset>"
      lore:
        - "<gray>讓溫室裡的植物加工不再靠手做。<reset>"
      details:
