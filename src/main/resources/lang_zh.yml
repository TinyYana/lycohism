    done: "<green>{facility} 已升級到 Lv2。</green> <gray>消耗了核心的輝能與材料。之後用指令或在升級結構旁開啟即享完整功能。</gray>"
    not-repaired: "<red>要先把這個設施修復到 Lv1 才能升級。</red>"
    already: "<gray>這個設施已經是 Lv2 了。</gray>"
    no-structure: "<red>還沒蓋出升級結構。</red> <gray>把設施蓋進對應的剛性結構（站到它旁邊再升級）。</gray>"
    blueprint-hint: "<gray>給了你一張<white>升級結構藍圖</white>：右鍵看半透明輪廓，照著蓋好（Shift右鍵可扣材料秒蓋），再回設施頁升級。</gray>"
    no-nexus: "<red>附近沒有你能存取的輝能核心。</red> <gray>流程：<gold>日／月輝塔</gold>→<yellow>中繼器</yellow>→<aqua>輝能核心</aqua>，再回來升級。</gray>"
    missing-materials: "<red>升級材料不足。</red>"
    missing-energy: "<red>核心的輝能不足。</red> <gray>讓日輝塔／月輝塔多產一些再來。</gray>"
  nexus:
    claimed: "<green>輝能核心已啟動，你成為擁有者。</green> <gray>右鍵核心可查看存量。下一步：用<yellow>中繼器</yellow>把<gold>日／月輝塔</gold>接進來供能。</gray>"
    not-allowed: "<red>這個輝能核心不屬於你，也未被分享。</red>"
    relay-registered: "<green>能量中繼器已接入網路。</green> <gray>它會把範圍內的塔與核心一段段串起來（靠近可見流動光束）。</gray>"
    relay-exists: "<gray>這個中繼器已經在網路裡了。</gray>"
    tower-registered: "<green>能量塔已登記，開始供能。</green> <gray>下一步：在 48 格內蓋<aqua>輝能核心</aqua>，或用<yellow>中繼器</yellow>把能量接過去。</gray>"
    tower-exists: "<gray>這座能量塔已經登記過了。</gray>"
    share-usage: "<gray>用法：<yellow>/{label} nexus <share|unshare> <玩家></yellow>（站在你擁有的核心附近）</gray>"
    no-owned: "<red>附近沒有你擁有的輝能核心。</red>"
    player-not-found: "<red>找不到玩家：{player}</red>"
    shared: "<green>已把核心存取分享給 <white>{player}</white>。</green>"
    unshared: "<green>已取消 <white>{player}</white> 的核心存取。</green>"
    share-noop: "<gray>沒有變化（對方本來就{state}）。</gray>"
  automation:
    engine-registered: "<green>自動調律機已啟動。</green> <gray>在它正上方放一個箱子當原料倉；每隔幾秒會取一份原料、消耗附近<aqua>輝能核心</aqua>的日輝，把加工成品放回箱子。</gray>"
    engine-status:
      - "<white>▌ 自動調律機（運作中）</white>"
      - "<gray>耗<gold>日輝</gold>：鵝卵石→石頭、石頭→石磚、沙→砂石、花崗岩→磨製花崗岩...</gray>"
      - "<gray>耗<aqua>月輝</aqua>：深板岩→深板岩磚、深板岩→磨製深板岩、黑石→磨製黑石...</gray>"
      - "<dark_gray>正上方放箱子當原料倉。</dark_gray>"
    cultivator-registered: "<green>育苗機已啟動。</green> <gray>在正上方放箱子當植物素材倉；每隔幾秒取一份、耗附近核心<aqua>月輝</aqua>、把加工成品放回箱子。</gray>"
    cultivator-status:
      - "<white>▌ 育苗機（運作中）</white>"
      - "<gray>耗<aqua>月輝</aqua>：仙人掌→綠色染料×2、甘蔗→砂糖×2、海帶→乾海帶×2、骨粉→骨頭。</gray>"
      - "<dark_gray>正上方放箱子當植物素材倉。</dark_gray>"
    condenser-registered: "<green>現象凝縮台已啟動。</green> <gray>在正上方放箱子當素材倉；每隔幾秒取一份、耗附近核心<aqua>月輝</aqua>、把凝縮成品放回箱子。</gray>"
    condenser-status:
      - "<white>▌ 現象凝縮台（運作中）</white>"
      - "<gray>耗<aqua>月輝</aqua>：腐肉→皮革、紙→書、墨囊→黑色染料×2、火藥棒→火藥粉×4、螢石粉→螢石。</gray>"
      - "<dark_gray>正上方放箱子當素材倉。</dark_gray>"
  infernal-relay:
    claimed: "<green>古老的廢址回應了你，魂靈焰火躍動。</green> <gray>下一步：建造<gradient:#ff7040:#ffd080>燼華鍛爐</gradient>，可在其中以烈焰棒＋地獄疣提煉<gradient:#ff5a00:#ffd080>焰輝碎片</gradient>。</gray>"
    exists: "<gray>這座廢址的魂靈焰火仍在燃燒，焰輝在空氣中流動。</gray>"
  ember-forge:
    guide:
      - "<gradient:#ff7040:#ffd080>── 燼華鍛爐 ──</gradient>"
      - "<gray>1. 把素材<white>丟</white>在鍛爐周圍（約 2.5 格內）。</gray>"
      - "<gray>2. <white>手持燼華</white>（Lycohism 物品），右鍵中央熔岩塊。</gray>"
      - "<gray>3. 消耗你身上的<gold>日輝</gold>煉成成品。</gray>"
      - "<gray>目前配方：</gray>"
  puzzle:
    seal:
      sealed: "<dark_gray>封印尚未解開。這個箱子對你還是封閉的。</dark_gray>"
      hint-discovery: "<gray>祠心在輝能中沉睡。似乎只有掌握輝能法陣奧義的人，才能觸及其中的共鳴…</gray>"
      hint-item: "<gray>封印的石面微微震動。手持某種輝能的結晶，感受它與石刻的頻率是否相符？</gray>"
      unlocked: "<gradient:#b0b8ff:#ffd6ff>封印的紋路流動，祠心共鳴解開。</gradient>"
      already-open: "<gray>這座祠對你已無封印。</gray>"

