  tidal_depths: "<gradient:#2a9bd6:#bfeeff>潮汐深淵</gradient>"
  tide_shade: "<gradient:#1f6f99:#7fc4e0>潮汐殘響</gradient>"
  sun_core: "<gradient:#ffd76b:#fff3c0>日輝核心</gradient>"
  tidal_warden: "<gradient:#2a9bd6:#a8f0e0>潮汐守望者</gradient>"
  eclipse_dial: "<gradient:#ffd86b:#b07cff>日月儀</gradient>"
  eclipse_warden: "<gradient:#ffcf66:#b07cff>蝕影守望者</gradient>"
  attunement_engine: "<gradient:#ffd98a:#a8c8ff>自動調律機</gradient>"
  seedling_cultivator: "<gradient:#a8e6a0:#d9f3a8>育苗機</gradient>"
  phenomenon_condenser: "<gradient:#b0b8ff:#d6c4ff>現象凝縮台</gradient>"
  infernal_shard: "<gradient:#ff5a00:#ffd080>焰輝碎片</gradient>"
  infernal_relay: "<gradient:#ff7040:#d06030>地獄廢址</gradient>"
  ember_forge: "<gradient:#ff7040:#ffd080>燼華鍛爐</gradient>"

# 每個自動化機器的功能描述（供藍圖物品 lore 注入 + 右鍵狀態顯示）。
content-descriptions:
  attunement_engine:
    - "<gray>耗<gold>日輝</gold>：石材加工（鵝卵石→石頭→石磚、沙→砂石、花崗岩→磨製花崗岩等）。</gray>"
    - "<gray>耗<aqua>月輝</aqua>：深岩加工（深板岩→深板岩磚、鵝卵石深板岩→磨製深板岩、黑石→磨製黑石等）。</gray>"
    - "<dark_gray>蓋好後右鍵高爐控制器認領；機器正上方放箱子當原料倉。</dark_gray>"
  seedling_cultivator:
    - "<gray>耗<aqua>月輝</aqua>：植物加工（仙人掌→綠色染料×2、甘蔗→砂糖×2、海帶→乾海帶×2、骨粉→骨頭）。</gray>"
    - "<dark_gray>蓋好後右鍵堆肥桶控制器認領；機器正上方放箱子當植物素材倉。</dark_gray>"
  phenomenon_condenser:
    - "<gray>耗<aqua>月輝</aqua>：素材凝縮（腐肉→皮革、紙→書、墨囊→黑色染料×2、火藥棒→火藥粉×4、螢石粉→螢石）。</gray>"
    - "<dark_gray>蓋好後右鍵講台控制器認領；機器正上方放箱子當素材倉。</dark_gray>"
  infernal_relay:
    - "<gray>地獄深處的古老廢址，魂靈焰火仍在燃燒。</gray>"
    - "<dark_gray>右鍵魂靈焰火認領；認領後可建造燼華鍛爐提煉焰輝碎片。</dark_gray>"
  ember_forge:
    - "<gray>耗<gold>日輝</gold>：以燼華催化烈焰棒＋地獄疣，精煉焰輝碎片×3。</gray>"
    - "<dark_gray>蓋好後空手右鍵中央熔岩塊查看用法；正下方地獄磚9塊基座＋四角磨製黑石磚柱。</dark_gray>"

structures:
  tidal-shrine:
    chest-name: "<aqua>潮汐神殿的祭品</aqua>"
  moss-altar:
    chest-name: "<dark_green>苔生調律壇的供物</dark_green>"
  dew-well:
    chest-name: "<aqua>露語井的沉積物</aqua>"
  wind-circle:
    chest-name: "<gray>風痕石環的藏物</gray>"
  rainfall-dungeon:
    chest-name: "<dark_aqua>雨浸地窖的補給箱</dark_aqua>"
  moondial:
    chest-name: "<light_purple>月晷下的供奉</light_purple>"
  sundial:
    chest-name: "<gold>日晷下的供奉</gold>"
  sealed-shrine:
    chest-name: "<gradient:#b0b8ff:#ffd6ff>封印祠的遺藏</gradient>"

items:
  dew_light:
    name: "<gradient:#fff6c0:#ffffff>露光瓶</gradient>"
    lore:
      - "<gray>在黑暗中提供兩分鐘夜視。</gray>"
      - "<dark_gray>右鍵消耗；使用後留下空玻璃瓶。</dark_gray>"
  flower_bookmark:
    name: "<gradient:#ffd6e8:#ffffff>花籤</gradient>"
    lore:
      - "<gray>記住一個地方，之後指引方向。</gray>"
      - "<dark_gray>Shift右鍵記住、右鍵指引。</dark_gray>"
  stonework_hammer:
    name: "<gradient:#cfd6df:#ffffff>石工槌</gradient>"
    lore:
      - "<gray>讓石材加工更方便。</gray>"
      - "<dark_gray>第一次右鍵預覽，5 秒內再次右鍵確認。</dark_gray>"
  stonework_hammer_tier_2:
    name: "<gradient:#ffe08a:#ffffff>二階石工槌</gradient>"
    lore:
      - "<gray>右鍵石材，一次塑形相連平面的 3×3 範圍。</gray>"
      - "<dark_gray>第一次右鍵預覽，再次右鍵確認 3×3 塑形。</dark_gray>"
  building_wand:
    name: "<gradient:#d8b8ff:#ffe8a8>築造杖</gradient>"
    lore:
      - "<gray>第一次右鍵預覽，5 秒內再次右鍵確認直線放置。</gray>"
      - "<dark_gray>從背包消耗相同的原版方塊；在輝能祭壇煉成。</dark_gray>"
  building_wand_tier_2:
    name: "<gradient:#8fe8ff:#ffe08a>二階築造杖</gradient>"
    lore:
      - "<gray>第一次右鍵預覽，再次右鍵確認放置。</gray>"
      - "<gray>Shift右鍵（對空亦可）切換：直線／牆面／地板／柱列。</gray>"
      - "<dark_gray>從背包消耗相同的原版方塊。</dark_gray>"
  rain_bandage:
    name: "<gradient:#8fd3ff:#ffffff>雨紋繃帶</gradient>"
    lore:
      - "<gray>用雨息浸潤的簡單繃帶。</gray>"
      - "<dark_gray>右鍵恢復少量生命，使用後消耗。</dark_gray>"
  flower_vein_shears:
    name: "<gradient:#ff9ed6:#ffffff>花脈剪</gradient>"
    lore:
      - "<gray>讓未成熟作物立刻長成。</gray>"
      - "<dark_gray>成熟後再右鍵可採收並補種。</dark_gray>"
  wind_vane:
    name: "<gradient:#b8e6ff:#ffffff>風標</gradient>"
    lore:
      - "<gray>讀取此刻的自然採集條件。</gray>"
      - "<dark_gray>拿在任一手時，持續顯示環境讀數。</dark_gray>"
  moon_pouch:
    name: "<gradient:#c7b8ff:#ffffff>月紗袋</gradient>"
    lore:
      - "<gray>自動收納撿到的自然現象。</gray>"
      - "<dark_gray>右鍵取出袋內全部內容。</dark_gray>"
  leyline_probe:
    name: "<gradient:#d8c3a5:#fff1d6>地脈探針</gradient>"
    lore:
      - "<gray>讓地脈砂回應附近的礦脈。</gray>"
      - "<dark_gray>拿在任一手時，持續顯示最近礦脈。</dark_gray>"
  rain_gate:
    name: "<gradient:#8fd3ff:#d9f3ff>雨痕門符</gradient>"
    lore:
      - "<gray>循著雨痕，前往下著雨的森林。</gray>"
      - "<dark_gray>主世界右鍵前往，遠征世界右鍵返回原地。</dark_gray>"
      - "<dark_gray>需先踏入過地獄，雨痕才會回應。</dark_gray>"
  moss_balm:
    name: "<gradient:#7fd6a0:#d8ffe8>苔露膏</gradient>"
    lore:
      - "<gray>右鍵塗抹，獲得一段溫和的持續再生。</gray>"
      - "<dark_gray>只能用雨後森林的苔華在溫室調製。</dark_gray>"
  moss_fertile:
    name: "<gradient:#9ad17f:#e6ffcf>苔肥</gradient>"
    lore:
      - "<gray>右鍵植物，催長周圍一小塊作物與植被。</gray>"
      - "<dark_gray>只能用雨後森林的苔華在溫室調製。</dark_gray>"
  energy_crystal:
    name: "<gradient:#ffe9a8:#a8c8ff>蓄能晶</gradient>"
    lore:
      - "<gray>放在背包就會吸收滿溢的輝能。</gray>"
      - "<gray>你的能量池滿了之後，多的會存進這裡。</gray>"
      - "<dark_gray>右鍵把晶體裡的能量倒回自身的輝能池。</dark_gray>"
  radiant_focus:
    name: "<gradient:#ffd98a:#c0a8ff>輝能之鏡</gradient>"
    lore:
      - "<gray>右鍵引動<gold>日輝</gold>：抗火與力量的日之祝福。</gray>"
      - "<gray>Shift右鍵引動<aqua>月輝</aqua>：夜視與緩降的月之祝福。</gray>"
      - "<dark_gray>在輝能祭壇以金錠＋月輝核心＋蓄能晶煉成。</dark_gray>"
  solar_pick:
    name: "<gradient:#ffe07a:#ffb24a>日炎鎬</gradient>"
    lore:
      - "<gray>右鍵消耗<gold>日輝</gold>，獲得一段挖掘加速。</gray>"
      - "<dark_gray>工房 Lv2 解鎖。</dark_gray>"
  star_compass:
    name: "<gradient:#aaccff:#e0f0ff>星圖羅盤</gradient>"
    lore:
      - "<gray>右鍵指出最近<aqua>能量塔</aqua>的方向與距離。</gray>"
      - "<dark_gray>書房（Lv1）製作。</dark_gray>"
  lunar_spore:
    name: "<gradient:#d8b8ff:#f0e0ff>月華灑</gradient>"
    lore:
      - "<gray>右鍵植物，消耗<aqua>月輝</aqua>對一片區域施骨粉。</gray>"
      - "<dark_gray>溫室 Lv2 解鎖。</dark_gray>"
  blueprint:
    name: "<gradient:#9ad1ff:#e0f0ff>{structure} 藍圖</gradient>"
    lore:
      - "<gray>看向地面右鍵：顯示<green>幽靈輪廓</green>（綠=有、紅=缺）。</gray>"
      - "<gray>Shift右鍵：用背包材料<white>直接建造</white>。</gray>"
      - "<dark_gray>建造 {structure} 的設計圖。</dark_gray>"
    materials: "<white>需要方塊：</white>"
    material-line: "<gray>• {material} ×{count}</gray>"

# 調律之路各章節文案（對應 progression.yml 的 stage id）。
progression:
  stages:
    awakening:
      title: "<white>初遇晨露</white>"
      lore:
        - "<gray>清晨的第一滴自然之力。</gray>"
      details:
        - "<gray>晨露採集與初階自然配方。</gray>"
      hint: "<gray>清晨在草地、花叢間採集晨露。</gray>"
    workshop:
      title: "<white>喚醒工房</white>"
      lore:
        - "<gray>讓基地長出第一個功能。</gray>"
      details:
        - "<gray>工具製作、建材加工與雨息附魔。</gray>"
      hint: "<gray>備齊材料，在工作台修復工房。</gray>"
    first_tools:
      title: "<white>第一件生活工具</white>"
      lore:
        - "<gray>自然開始替你解決生存的小麻煩。</gray>"
      details:
        - "<gray>露光瓶：消耗後獲得兩分鐘夜視。</gray>"
      hint: "<gray>在工房用晨露做出露光瓶。</gray>"
    rain:
      title: "<white>雨的氣息</white>"
      lore:
        - "<gray>雨天不再只是等待。</gray>"
      details:
        - "<gray>採集雨息，催長作物並製作恢復用品。</gray>"
      hint: "<gray>雨天在水邊與森林採集雨息。</gray>"
    study:
      title: "<white>翻開書房</white>"
      lore:
        - "<gray>開始記錄你走過的路。</gray>"
      details:
        - "<gray>手冊、圖鑑、發現紀錄與調律之路。</gray>"
      hint: "<gray>備齊材料，整理書房。</gray>"
    greenhouse:
      title: "<white>溫室生機</white>"
      lore:
        - "<gray>植物與農業有了著落。</gray>"
      details:
        - "<gray>植物培育、花脈剪、苔露膏與苔肥。</gray>"
      hint: "<gray>備齊材料，開墾溫室。</gray>"
    night:
      title: "<white>夜的記憶</white>"
      lore:
        - "<gray>夜晚與月色值得停留。</gray>"
      details:
        - "<gray>月露，以及風標與月紗袋的製作。</gray>"
      hint: "<gray>晴朗的滿月夜採集月露。</gray>"
    nether_gate:
      title: "<white>通往地獄</white>"
      lore:
        - "<gray>更遠的路，需要更深的足跡。</gray>"
      details:
        - "<gray>書房中的雨後森林入口。</gray>"
      hint: "<gray>踏入地獄一次，書房的遠征入口便會解鎖。</gray>"
    infernal_relay:
      title: "<gradient:#ff7040:#ffd080>地獄廢址</gradient>"
      lore:
        - "<gray>古老的中繼廢址，魂靈焰火仍在燃燒。</gray>"
      details:
        - "<gray>在地獄深處尋找鑿裂地獄磚平台＋四角牆柱＋中央魂靈焰火的廢址。</gray>"
        - "<gray>右鍵中央魂靈焰火認領廢址；此後可在輝能祭壇以燼華提煉焰輝碎片。</gray>"
      hint: "<gray>深入地獄，尋找仍燃燒著魂靈焰火的古老廢址。</gray>"
    ember_forge:
      title: "<gradient:#ff7040:#ffd080>燼華鍛爐</gradient>"
      lore:
        - "<gray>地獄礦物的煉製需要更深的火。</gray>"
      details:
        - "<gray>燼華鍛爐：地獄磚9塊基座＋四角磨製黑石磚柱＋中央熔岩塊控制器。</gray>"
        - "<gray>手持燼華右鍵熔岩塊，以烈焰棒＋地獄疣消耗日輝提煉焰輝碎片。</gray>"
      hint: "<gray>建造燼華鍛爐（地獄磚3×3基座＋四角磨製黑石磚柱＋中央熔岩塊），空手右鍵查看配方。</gray>"
    radiant_vein:
      title: "<gold>地獄輝脈</gold>"
      lore:
        - "<gray>金紋黑石裡，藏著本世界沒有的結晶。</gray>"
      details:
        - "<gray>輝脈晶：Lycohism 專屬礦物，用於二階工具與祭壇造物。</gray>"
      hint: "<gray>探索新生成的地獄區塊，挖掘岩層中的金紋黑石礦脈。</gray>"
    expedition:
      title: "<white>第一次遠征</white>"
      lore:
        - "<gray>走出主世界，去雨後的森林。</gray>"
      details:
        - "<gray>雨後森林與專屬素材苔華。</gray>"
      hint: "<gray>從書房的遠征介面前往雨後森林。</gray>"
    expedition_yield:
      title: "<white>帶回的禮物</white>"
      lore:
        - "<gray>遠征的收穫，化成只有那裡才有的東西。</gray>"
      details:
        - "<gray>用苔華調製苔露膏與苔肥。</gray>"
      hint: "<gray>用苔華在溫室調製苔露膏。</gray>"
    radiance:
      title: "<white>輝能初現</white>"
      lore:
        - "<gray>日與月的光，開始能被收攏。</gray>"
      details:
        - "<gray>蓄能晶；在天空下被動蓄日輝與月輝。</gray>"
      hint: "<gray>在工房製作蓄能晶，到戶外站在天空下蓄能。</gray>"
    solar_tower:
      title: "<gold>日之塔</gold>"
      lore:
        - "<gray>循著日光，尋找第一座高塔。</gray>"
      details:
        - "<gray>日輝塔：高聳的剛性地標，白天見天時供應日輝。</gray>"
      hint: "<gray>在世界各地尋找自然生成的<gold>日晷（日輝塔）</gold>；靠近它就會被記錄。（管理員可 /lycohism build sun_tower 生成）</gray>"
    lunar_tower:
      title: "<aqua>月之塔</aqua>"
      lore:
        - "<gray>循著月色，尋找對應的高塔。</gray>"
      details:
        - "<gray>月輝塔：與日輝塔對稱，夜晚見天時供應月輝。</gray>"
      hint: "<gray>尋找自然生成的<aqua>月晷（月輝塔）</aqua>，靠近它就會被記錄；永夜荒原與主世界都可能出現。</gray>"
    lunar_waste:
      title: "<white>踏入永夜</white>"
      lore:
        - "<gray>沒有黎明的荒原，是月之力的源頭。</gray>"
      details:
        - "<gray>永夜荒原：整日可蓄月輝、月輝核心的產地。</gray>"
      hint: "<gray>從書房遠征介面前往永夜荒原。</gray>"
    energy_altar:
      title: "<white>輝能祭壇</white>"
      lore:
        - "<gray>立一座祭壇，高階煉製從此開始。</gray>"
      details:
        - "<gray>輝能祭壇：丟素材、手持催化物右鍵、消耗輝能煉成。</gray>"
      hint: "<gray>建造輝能祭壇（中央附魔台＋一圈深板岩台座），空手右鍵祭壇可查看用法與配方。</gray>"
    moon_attunement:
      title: "<white>月之調律</white>"
      lore:
        - "<gray>把帶回的月輝核心，鍛成可用的力量。</gray>"
      details:
        - "<gray>輝能之鏡：在祭壇以日輝／月輝引動日月之祝福。</gray>"
      hint: "<gray>在輝能祭壇手持金錠、丟入月輝核心與蓄能晶，消耗日月輝煉成輝能之鏡。</gray>"
    tidal_depths:
      title: "<gradient:#2a9bd6:#bfeeff>潛入暖海</gradient>"
      lore:
        - "<gray>永晝的海，是日之力的源頭。</gray>"
      details:
        - "<gray>潮汐深淵：白天蓄日輝加倍、日輝核心的產地（對位永夜荒原）。</gray>"
      hint: "<gray>從書房遠征介面前往潮汐深淵。</gray>"
    solar_attunement:
      title: "<gradient:#ffd76b:#fff3c0>日之調律</gradient>"
      lore:
        - "<gray>把帶回的日輝核心，鍛成可用的力量。</gray>"
      details:
        - "<gray>日炎鎬：以日輝引動急迫，日線與月之調律對位。</gray>"
      hint: "<gray>升級工房後，在工房製作日炎鎬。</gray>"
    radiant_nexus:
      title: "<gold>輝能據點</gold>"
      lore:
        - "<gray>把流散的輝能，收攏進一座核心。</gray>"
      details:
        - "<gray>輝能核心：基地能量倉，可分享給夥伴。</gray>"
        - "<gray>能量流向：<gold>日／月輝塔</gold>（產能）→<yellow>中繼器</yellow>（接力）→<aqua>核心</aqua>（儲存）。</gray>"
      hint: "<gray>建造輝能核心並右鍵信標核心啟動認領；把它蓋在塔水平 48 格內，能量就會流進來（靠近會看到光束）。</gray>"
    energy_grid:
      title: "<yellow>輝能網路</yellow>"
      lore:
        - "<gray>用中繼器把塔與核心串成一張網。</gray>"
      details:
        - "<gray>能量中繼器：每段 48 格把塔的能量接力到更遠的核心。</gray>"
        - "<gray>塔只在對應時段（日塔白天／月塔夜晚）＋見天時產能。</gray>"
      hint: "<gray>塔離核心太遠時，在中間建造能量中繼器並右鍵啟動；靠近時會看到流動的光束代表能量在走。</gray>"
    facility_growth:
      title: "<white>設施的成長</white>"
      lore:
        - "<gray>把累積的輝能，回饋到基地本身。</gray>"
      details:
        - "<gray>升級＝蓋出設施的「升級結構」＋消耗核心輝能。</gray>"
        - "<gray>之後在升級結構旁或用指令開啟，即享 Lv2 完整功能。</gray>"
      hint: "<gray>把工房／書房／溫室蓋進對應的升級結構，在旁邊開設施頁點「升級」（或 /lycohism upgrade）。</gray>"
    attunement_engine:
      title: "<white>自動調律機</white>"
      lore:
        - "<gray>讓基地接手重複的建材加工。</gray>"
      details:
        - "<gray>在輝能核心附近蓋出自動調律機（藍圖於工房 Lv2 製作），右鍵中央高爐認領。</gray>"
        - "<gray>正上方放箱子當原料倉；它每隔幾秒取一份原料、耗核心日輝、把成品放回箱子。</gray>"
      hint: "<gray>到工房 Lv2 製作「自動調律機藍圖」，在核心 48 格內蓋好、右鍵高爐認領，正上方放個箱子丟入鵝卵石。</gray>"

    eclipse_realm:
      title: "<gradient:#5a3a6a:#ffd86b>暮蝕之境</gradient>"
      lore:
        - "<gray>日與月的兩條路，在蝕中交會。</gray>"
      details:
        - "<gray>走過「日」的潮汐深淵與「月」的永夜荒原，蝕的章節才開啟。</gray>"
        - "<gray>第三遠征地：陰暗的黃昏，戰場與日月儀已自然成形。</gray>"
      hint: "<gray>先走過潮汐深淵與永夜荒原，再從書房前往<white>暮蝕之境</white>。</gray>"

    eclipse_warden:
      title: "<gradient:#ffcf66:#b07cff>蝕影守望者</gradient>"
      lore:
        - "<gray>蝕落下時，守望者甦醒。</gray>"
      details:
        - "<gray>在暮蝕之境的日月儀，手持<gold>日輝核心</gold>＋<aqua>月輝核心</aqua>右鍵核心即可召喚。</gray>"
        - "<gray>擊敗後掉落<gradient:#ffd86b:#b07cff>蝕輝結晶</gradient>——三階設施的鑰匙。</gray>"
      hint: "<gray>在暮蝕之境召喚並擊敗蝕影守望者，取得蝕輝結晶。</gray>"

    seedling_cultivator:
      title: "<white>育苗機</white>"
      lore:
        - "<gray>讓溫室裡的植物加工不再靠手做。</gray>"
      details:
        - "<gray>育苗機：月輝驅動，處理植物素材（仙人掌→染料、海帶→乾海帶等）。</gray>"
        - "<gray>溫室 Lv2 器物頁製作藍圖，在核心 48 格內蓋好→右鍵堆肥桶認領。</gray>"
      hint: "<gray>升級溫室到 Lv2，在器物頁製作「育苗機藍圖」，照藍圖蓋好後右鍵堆肥桶認領。</gray>"

    phenomenon_condenser:
      title: "<white>現象凝縮台</white>"
      lore:
        - "<gray>把普通素材凝縮成更精純的形態。</gray>"
      details:
        - "<gray>現象凝縮台：月輝驅動，處理學術素材（腐肉→皮革、紙→書等）。</gray>"
        - "<gray>書房 Lv2 器物頁製作藍圖，在核心 48 格內蓋好→右鍵講台認領。</gray>"
      hint: "<gray>升級書房到 Lv2，在器物頁製作「現象凝縮台藍圖」，照藍圖蓋好後右鍵講台認領。</gray>"

    sealed_shrine:
      title: "<white>封印祠</white>"
      lore:
        - "<gray>輝能奧義的試煉——解開封印，取走藏寶。</gray>"
      details:
        - "<gray>封印祠：主世界自然生成，有一座封印寶箱與鑿刻深板岩控制器。</gray>"
        - "<gray>直接開箱會被封印；需掌握輝能核心奧義＋手持蓄能晶，右鍵控制器解封。</gray>"
      hint: "<gray>先建造輝能核心，再去主世界尋找深板岩平台＋紫水晶柱的結構，手持蓄能晶右鍵中央鑿刻深板岩。</gray>"

    facility_growth_3:
      title: "<gradient:#ffd86b:#b07cff>三階設施</gradient>"
      lore:
        - "<gray>蝕之輝光，灌注進基地的最後一層。</gray>"
      details:
        - "<gray>用蝕輝結晶把工房／書房／溫室升到 Lv3（不需升級結構）。</gray>"
        - "<gray>Lv3：工房戰鬥附魔、書房全境預報、溫室產出翻倍。</gray>"
      hint: "<gray>備齊蝕輝結晶與核心輝能，在設施頁點「升級 → Lv3」。</gray>"

