    lore:
      - "<gray>First right-click previews; right-click again to confirm placement.</gray>"
      - "<gray>Shift+right-click (even into the air) to switch: line / wall / floor / column.</gray>"
      - "<dark_gray>Consumes the same vanilla blocks from your inventory.</dark_gray>"
  rain_bandage:
    name: "<gradient:#8fd3ff:#ffffff>Rain Bandage</gradient>"
    lore:
      - "<gray>A simple bandage steeped in Rain Breath.</gray>"
      - "<dark_gray>Right-click to restore a little health; consumed on use.</dark_gray>"
  flower_vein_shears:
    name: "<gradient:#ff9ed6:#ffffff>Flower Vein Shears</gradient>"
    lore:
      - "<gray>Makes immature crops grow instantly.</gray>"
      - "<dark_gray>Right-click again once mature to harvest and replant.</dark_gray>"
  wind_vane:
    name: "<gradient:#b8e6ff:#ffffff>Wind Vane</gradient>"
    lore:
      - "<gray>Reads the current natural harvest conditions.</gray>"
      - "<dark_gray>While held in either hand, keeps showing the environment readout.</dark_gray>"
  moon_pouch:
    name: "<gradient:#c7b8ff:#ffffff>Moon Pouch</gradient>"
    lore:
      - "<gray>Automatically stores natural phenomena you pick up.</gray>"
      - "<dark_gray>Right-click to release everything inside.</dark_gray>"
  leyline_probe:
    name: "<gradient:#d8c3a5:#fff1d6>Leyline Probe</gradient>"
    lore:
      - "<gray>Makes Leyline Sand respond to nearby ore veins.</gray>"
      - "<dark_gray>While held in either hand, keeps showing the nearest ore vein.</dark_gray>"
  rain_gate:
    name: "<gradient:#8fd3ff:#d9f3ff>Rainmark Gate</gradient>"
    lore:
      - "<gray>Follow the rain-marks to a forest in the rain.</gray>"
      - "<dark_gray>Right-click in the Overworld to travel; right-click in the expedition world to return.</dark_gray>"
      - "<dark_gray>You must first set foot in the Nether for the rain-marks to answer.</dark_gray>"
  moss_balm:
    name: "<gradient:#7fd6a0:#d8ffe8>Moss Balm</gradient>"
    lore:
      - "<gray>Right-click to apply for a gentle stretch of Regeneration.</gray>"
      - "<dark_gray>Brewed in the greenhouse only from Rainfall Forest Moss Bloom.</dark_gray>"
  moss_fertile:
    name: "<gradient:#9ad17f:#e6ffcf>Moss Fertilizer</gradient>"
    lore:
      - "<gray>Right-click a plant to grow a small patch of crops and vegetation around it.</gray>"
      - "<dark_gray>Brewed in the greenhouse only from Rainfall Forest Moss Bloom.</dark_gray>"
  energy_crystal:
    name: "<gradient:#ffe9a8:#a8c8ff>Energy Crystal</gradient>"
    lore:
      - "<gray>Held in your inventory, it absorbs overflowing radiance.</gray>"
      - "<gray>Once your energy pool is full, the surplus is stored here.</gray>"
      - "<dark_gray>Right-click to pour the crystal's energy back into your own pool.</dark_gray>"
  radiant_focus:
    name: "<gradient:#ffd98a:#c0a8ff>Radiant Focus</gradient>"
    lore:
      - "<gray>Right-click to draw <gold>Sunlight</gold>: a sun blessing of Fire Resistance and Strength.</gray>"
      - "<gray>Shift+right-click to draw <aqua>Moonlight</aqua>: a moon blessing of Night Vision and Slow Falling.</gray>"
      - "<dark_gray>Forged at the Radiance Altar from gold ingots + Moon Core + Energy Crystal.</dark_gray>"
  solar_pick:
    name: "<gradient:#ffe07a:#ffb24a>Solar Pickaxe</gradient>"
    lore:
      - "<gray>Right-click to spend <gold>Sunlight</gold> for a burst of Haste.</gray>"
      - "<dark_gray>Unlocked at Workshop Lv2.</dark_gray>"
  star_compass:
    name: "<gradient:#aaccff:#e0f0ff>Star Compass</gradient>"
    lore:
      - "<gray>Right-click to point to the direction and distance of the nearest <aqua>energy tower</aqua>.</gray>"
      - "<dark_gray>Crafted at the Study (Lv1).</dark_gray>"
  lunar_spore:
    name: "<gradient:#d8b8ff:#f0e0ff>Lunar Spore</gradient>"
    lore:
      - "<gray>Right-click a plant to spend <aqua>Moonlight</aqua> and bone-meal an area.</gray>"
      - "<dark_gray>Unlocked at Greenhouse Lv2.</dark_gray>"
  blueprint:
    name: "<gradient:#9ad1ff:#e0f0ff>{structure} Blueprint</gradient>"
    lore:
      - "<gray>Right-click facing the ground: show a <green>ghost outline</green> (green = present, red = missing).</gray>"
      - "<gray>Shift+right-click: <white>build directly</white> using materials from your inventory.</gray>"
      - "<dark_gray>The design for building the {structure}.</dark_gray>"
    materials: "<white>Blocks required:</white>"
    material-line: "<gray>• {material} ×{count}</gray>"

# Text for each chapter of the Path of Attunement (matches stage ids in progression.yml).
progression:
  stages:
    awakening:
      title: "<white>First Morning Dew</white>"
      lore:
        - "<gray>The first drop of natural power at dawn.</gray>"
      details:
        - "<gray>Morning Dew harvesting and the earliest natural recipes.</gray>"
      hint: "<gray>At dawn, harvest Morning Dew among grass and flowers.</gray>"
    workshop:
      title: "<white>Wake the Workshop</white>"
      lore:
        - "<gray>Grow the first function out of your base.</gray>"
      details:
        - "<gray>Tool crafting, material processing and Rain-Breath enchanting.</gray>"
      hint: "<gray>Gather the materials and repair the workshop at a crafting table.</gray>"
    first_tools:
      title: "<white>Your First Living Tool</white>"
      lore:
        - "<gray>Nature begins to solve the small troubles of survival for you.</gray>"
      details:
        - "<gray>Dewlight Vial: grants two minutes of night vision once consumed.</gray>"
      hint: "<gray>Craft a Dewlight Vial at the workshop using Morning Dew.</gray>"
    rain:
      title: "<white>The Breath of Rain</white>"
      lore:
        - "<gray>A rainy day is no longer just waiting.</gray>"
      details:
        - "<gray>Harvest Rain Breath to grow crops and craft restoratives.</gray>"
      hint: "<gray>On a rainy day, harvest Rain Breath by water and in forests.</gray>"
    study:
      title: "<white>Open the Study</white>"
      lore:
        - "<gray>Begin recording the road you have walked.</gray>"
      details:
        - "<gray>The manual, compendium, discovery record and Path of Attunement.</gray>"
      hint: "<gray>Gather the materials and set the study in order.</gray>"
    greenhouse:
      title: "<white>Life in the Greenhouse</white>"
      lore:
        - "<gray>Plants and farming find a home.</gray>"
      details:
        - "<gray>Plant cultivation, Flower Vein Shears, Moss Balm and Moss Fertilizer.</gray>"
      hint: "<gray>Gather the materials and reclaim the greenhouse.</gray>"
    night:
      title: "<white>Memory of the Night</white>"
      lore:
        - "<gray>The night and the moonlight are worth lingering on.</gray>"
      details:
        - "<gray>Moon Dew, and crafting the Wind Vane and Moon Pouch.</gray>"
      hint: "<gray>On a clear full-moon night, harvest Moon Dew.</gray>"
    nether_gate:
      title: "<white>Toward the Nether</white>"
      lore:
        - "<gray>A further road needs deeper footprints.</gray>"
      details:
        - "<gray>The Rainfall Forest entrance in the study.</gray>"
      hint: "<gray>Set foot in the Nether once, and the study's expedition entrance unlocks.</gray>"
    infernal_relay:
      title: "<gradient:#ff7040:#ffd080>Infernal Ruins</gradient>"
      lore:
        - "<gray>An ancient relay ruin, its soul fire still burning.</gray>"
      details:
        - "<gray>Deep in the Nether, find a ruin: a cracked nether-brick platform + corner pillars + central soul fire.</gray>"
        - "<gray>Right-click the central soul fire to claim the ruin; afterwards you can refine Infernal Shards from Ember Bloom at the Radiance Altar.</gray>"
      hint: "<gray>Venture deep into the Nether and find an ancient ruin still burning with soul fire.</gray>"
    ember_forge:
      title: "<gradient:#ff7040:#ffd080>Ember Forge</gradient>"
      lore:
        - "<gray>Refining Nether minerals needs a deeper fire.</gray>"
      details:
        - "<gray>Ember Forge: a 9-block nether-brick base + polished blackstone brick pillars at the corners + a central magma-block controller.</gray>"
        - "<gray>Hold Ember Bloom and right-click the magma block to refine Infernal Shards from blaze rods + nether wart, spending Sunlight.</gray>"
      hint: "<gray>Build the Ember Forge (a 3×3 nether-brick base + corner polished blackstone brick pillars + central magma block) and empty-hand right-click to view the recipe.</gray>"
    radiant_vein:
      title: "<gold>Nether Radiant Vein</gold>"
      lore:
        - "<gray>Within gilded blackstone hides a crystal this world does not have.</gray>"
      details:
        - "<gray>Radiant Ore: a Lycohism-exclusive mineral, used for tier-2 tools and altar creations.</gray>"
      hint: "<gray>Explore newly generated Nether chunks and mine the gilded blackstone veins in the rock layers.</gray>"
    expedition:
      title: "<white>The First Expedition</white>"
      lore:
        - "<gray>Step out of the Overworld, into the forest after the rain.</gray>"
      details:
        - "<gray>The Rainfall Forest and its exclusive material, Moss Bloom.</gray>"
      hint: "<gray>Travel to the Rainfall Forest from the study's expedition screen.</gray>"
    expedition_yield:
      title: "<white>Gifts Brought Home</white>"
      lore:
        - "<gray>The spoils of an expedition become something only found there.</gray>"
      details:
        - "<gray>Brew Moss Balm and Moss Fertilizer from Moss Bloom.</gray>"
      hint: "<gray>Brew Moss Balm from Moss Bloom in the greenhouse.</gray>"
    radiance:
      title: "<white>Radiance Emerges</white>"
      lore:
        - "<gray>The light of sun and moon can begin to be gathered.</gray>"
      details:
        - "<gray>Energy Crystal; passively gather Sunlight and Moonlight under the open sky.</gray>"
      hint: "<gray>Craft an Energy Crystal at the workshop, then stand under the open sky outdoors to gather energy.</gray>"
    solar_tower:
      title: "<gold>Tower of the Sun</gold>"
      lore:
        - "<gray>Follow the sunlight and find the first high tower.</gray>"
      details:
        - "<gray>Sun Tower: a tall rigid landmark that supplies Sunlight under open daytime sky.</gray>"
      hint: "<gray>Find a naturally generated <gold>Sundial (Sun Tower)</gold> around the world; approach it to be recorded. (Admins can /lycohism build sun_tower.)</gray>"
    lunar_tower:
      title: "<aqua>Tower of the Moon</aqua>"
      lore:
        - "<gray>Follow the moonlight and find the matching high tower.</gray>"
      details:
        - "<gray>Moon Tower: mirror of the Sun Tower, supplying Moonlight under open night sky.</gray>"
      hint: "<gray>Find a naturally generated <aqua>Moondial (Moon Tower)</aqua> and approach it to be recorded; it may appear in the Moonless Waste or the Overworld.</gray>"
    lunar_waste:
      title: "<white>Into the Endless Night</white>"
      lore:
        - "<gray>A waste without dawn is the source of the moon's power.</gray>"
      details:
        - "<gray>Moonless Waste: gather Moonlight all day, and the source of the Moon Core.</gray>"
      hint: "<gray>Travel to the Moonless Waste from the study's expedition screen.</gray>"
    energy_altar:
      title: "<white>The Radiance Altar</white>"
      lore:
        - "<gray>Raise an altar, and higher refining begins here.</gray>"
      details:
        - "<gray>Radiance Altar: drop materials, hold a catalyst and right-click, spending radiance to refine.</gray>"
      hint: "<gray>Build the Radiance Altar (a central enchanting table + a ring of deepslate pedestals); empty-hand right-click it to view its use and recipes.</gray>"
    moon_attunement:
      title: "<white>Attunement of the Moon</white>"
      lore:
        - "<gray>Forge the Moon Core you brought back into usable power.</gray>"
      details:
        - "<gray>Radiant Focus: draw sun/moon blessings at the altar with Sunlight/Moonlight.</gray>"
      hint: "<gray>At the Radiance Altar, hold gold ingots, drop in a Moon Core and Energy Crystal, and spend radiance to forge the Radiant Focus.</gray>"
    tidal_depths:
      title: "<gradient:#2a9bd6:#bfeeff>Dive the Warm Sea</gradient>"
      lore:
        - "<gray>The sea of endless day is the source of the sun's power.</gray>"
      details:
        - "<gray>Tidal Depths: gather Sunlight at double rate by day, the source of the Sun Core (mirror of the Moonless Waste).</gray>"
      hint: "<gray>Travel to the Tidal Depths from the study's expedition screen.</gray>"
    solar_attunement:
      title: "<gradient:#ffd76b:#fff3c0>Attunement of the Sun</gradient>"
      lore:
        - "<gray>Forge the Sun Core you brought back into usable power.</gray>"
      details:
        - "<gray>Solar Pickaxe: draw Haste with Sunlight; the sun line mirrors the moon attunement.</gray>"
      hint: "<gray>After upgrading the workshop, craft the Solar Pickaxe at the workshop.</gray>"
    radiant_nexus:
      title: "<gold>Radiance Base</gold>"
      lore:
        - "<gray>Gather the scattered radiance into one core.</gray>"
      details:
        - "<gray>Radiance Nexus: your base's energy store, shareable with companions.</gray>"
        - "<gray>Energy flow: <gold>Sun/Moon Tower</gold> (produce) → <yellow>Relay</yellow> (carry) → <aqua>Nexus</aqua> (store).</gray>"
      hint: "<gray>Build a Radiance Nexus and right-click the beacon core to claim it; place it within 48 horizontal blocks of a tower and energy flows in (you'll see a beam when close).</gray>"
    energy_grid:
      title: "<yellow>The Radiance Network</yellow>"
      lore:
        - "<gray>Use Relays to string towers and the Nexus into one web.</gray>"
      details:
        - "<gray>Energy Relay: carries a tower's energy to a farther Nexus, 48 blocks per hop.</gray>"
        - "<gray>Towers only produce in their matching period (sun by day / moon by night) and under open sky.</gray>"
      hint: "<gray>When a tower is too far from the Nexus, build and activate an Energy Relay between them; a flowing beam when nearby means energy is moving.</gray>"
    facility_growth:
      title: "<white>Growth of the Facilities</white>"
      lore:
        - "<gray>Feed the radiance you have gathered back into the base itself.</gray>"
      details:
        - "<gray>Upgrade = build the facility's 'upgrade structure' + spend Nexus radiance.</gray>"
        - "<gray>Afterwards, access the full Lv2 features beside the upgrade structure or via command.</gray>"
      hint: "<gray>Build your Workshop/Study/Greenhouse into the matching upgrade structure, then click 'Upgrade' on the facility page beside it (or /lycohism upgrade).</gray>"
    attunement_engine:
      title: "<white>Attunement Engine</white>"
      lore:
        - "<gray>Let the base take over the repetitive material processing.</gray>"
      details:
        - "<gray>Build an Attunement Engine near a Radiance Nexus (blueprint crafted at Workshop Lv2), then right-click the central blast furnace to claim it.</gray>"
        - "<gray>Place a chest directly above as the input bin; every few seconds it takes one input, spends Nexus Sunlight, and returns the product to the chest.</gray>"
      hint: "<gray>At Workshop Lv2, craft an 'Attunement Engine Blueprint', build it within 48 blocks of a Nexus, right-click the blast furnace to claim it, and place a chest above with cobblestone inside.</gray>"

    eclipse_realm:
      title: "<gradient:#5a3a6a:#ffd86b>Eclipse Realm</gradient>"
      lore:
        - "<gray>The two roads of sun and moon meet in the eclipse.</gray>"
      details:
        - "<gray>Walk the 'sun' Tidal Depths and the 'moon' Moonless Waste, and the eclipse chapter opens.</gray>"
        - "<gray>The third expedition: a dim dusk where the battlefield and Eclipse Dial have already formed.</gray>"
      hint: "<gray>First walk the Tidal Depths and the Moonless Waste, then travel to the <white>Eclipse Realm</white> from the study.</gray>"

    eclipse_warden:
      title: "<gradient:#ffcf66:#b07cff>Eclipse Warden</gradient>"
      lore:
        - "<gray>When the eclipse falls, the Warden awakens.</gray>"
      details:
        - "<gray>At the Eclipse Dial in the Eclipse Realm, hold a <gold>Sun Core</gold> + <aqua>Moon Core</aqua> and right-click the core to summon it.</gray>"
        - "<gray>Defeating it drops an <gradient:#ffd86b:#b07cff>Eclipse Crystal</gradient> — the key to tier-3 facilities.</gray>"
      hint: "<gray>Summon and defeat the Eclipse Warden in the Eclipse Realm to obtain an Eclipse Crystal.</gray>"

    seedling_cultivator:
      title: "<white>Seedling Cultivator</white>"
      lore:
        - "<gray>Free greenhouse plant processing from doing it by hand.</gray>"
      details:
        - "<gray>Seedling Cultivator: Moonlight-driven, processes plant materials (cactus→dye, kelp→dried kelp, etc.).</gray>"
        - "<gray>Craft the blueprint on the Greenhouse Lv2 tools page, build it within 48 blocks of a Nexus → right-click the composter to claim it.</gray>"
      hint: "<gray>Upgrade the greenhouse to Lv2, craft a 'Seedling Cultivator Blueprint' on the tools page, build it per the blueprint and right-click the composter to claim it.</gray>"

    phenomenon_condenser:
      title: "<white>Phenomenon Condenser</white>"
      lore:
        - "<gray>Condense ordinary materials into a more refined form.</gray>"
      details:
        - "<gray>Phenomenon Condenser: Moonlight-driven, processes scholarly materials (rotten flesh→leather, paper→book, etc.).</gray>"
        - "<gray>Craft the blueprint on the Study Lv2 tools page, build it within 48 blocks of a Nexus → right-click the lectern to claim it.</gray>"
      hint: "<gray>Upgrade the study to Lv2, craft a 'Phenomenon Condenser Blueprint' on the tools page, build it per the blueprint and right-click the lectern to claim it.</gray>"

    sealed_shrine:
      title: "<white>Sealed Shrine</white>"
      lore:
        - "<gray>A trial of radiance lore — break the seal and take the treasure.</gray>"
      details:
        - "<gray>Sealed Shrine: generated naturally in the Overworld, with a sealed treasure chest and a chiseled deepslate controller.</gray>"
        - "<gray>Opening the chest directly is sealed; you must grasp the Radiance Nexus lore + hold an Energy Crystal and right-click the controller to unseal it.</gray>"
      hint: "<gray>First build a Radiance Nexus, then find a structure of a deepslate platform + amethyst pillars in the Overworld, and right-click the central chiseled deepslate while holding an Energy Crystal.</gray>"

    facility_growth_3:
      title: "<gradient:#ffd86b:#b07cff>Tier-3 Facilities</gradient>"
      lore:
        - "<gray>The light of the eclipse pours into the base's final layer.</gray>"
      details:
        - "<gray>Use Eclipse Crystals to raise the Workshop/Study/Greenhouse to Lv3 (no upgrade structure needed).</gray>"
        - "<gray>Lv3: workshop combat enchants, study regional forecast, greenhouse double output.</gray>"
      hint: "<gray>Gather Eclipse Crystals and Nexus radiance, then click 'Upgrade → Lv3' on the facility page.</gray>"

