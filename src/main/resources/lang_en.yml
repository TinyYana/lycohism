    - "<gray>Once you find your first natural phenomenon, you'll receive an <white>Attunement Manual<reset>.<reset>"
    - "<gray>Stuck? Type <yellow>/lyco progress<reset>.<reset>"
    - "<dark_gray>Facilities open with Sneak + empty hand + right-click.<reset>"
