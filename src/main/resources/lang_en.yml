          - ""
          - "<black>Place the Nexus within 48 blocks of a tower,</black>"
          - "<black>or carry it over with a Relay. When near,</black>"
          - "<black>a flowing beam means energy is moving.</black>"
        hint:
          - "<dark_gray>· The Radiance Network</dark_gray>"
          - ""
          - "<black>Charge an Energy Crystal, raise a Sun/Moon Tower,</black>"
          - "<black>and use Relays to send energy into the Nexus.</black>"
      # Sealed Shrine tutorial page: shown after you have an Energy Crystal, telling the
      # player such a puzzle structure exists in the world.
      - requires: [ sealed_shrine ]
        title: "Sealed Shrine"
        done:
          - "<dark_green><bold>✔ Sealed Shrine</bold></dark_green>"
          - ""
          - "<black>The chiseled deepslate patterns flowed,</black>"
          - "<black>the seal broke, and the treasure was taken.</black>"
        hint:
          - "<dark_gray>· Sealed Shrine</dark_gray>"
          - ""
          - "<black>Search around the world for a structure of</black>"
          - "<dark_purple>a deepslate platform + amethyst pillars</dark_purple>"
          - "<dark_purple>+ soul lanterns</dark_purple><black>.</black>"
          - ""
          - "<black>The chest is sealed —</black>"
          - "<black>you must grasp the radiance-array lore</black>"
          - "<black>and right-click the controller holding an </black><gold>Energy Crystal</gold><black>.</black>"
      # Seedling Cultivator tutorial page: shown after the Attunement Engine, introducing
      # the Greenhouse Lv2 Moonlight plant-processing machine.
      - requires: [ seedling_cultivator ]
        title: "Seedling Cultivator"
        done:
          - "<dark_green><bold>✔ Seedling Cultivator</bold></dark_green>"
          - ""
          - "<black>A Moonlight-driven plant processor.</black>"
          - "<black>Cactus→dye, sugar cane→sugar,</black>"
          - "<black>kelp→dried kelp, and more.</black>"
        hint:
          - "<dark_gray>· Seedling Cultivator</dark_gray>"
          - ""
          - "<black>Upgrade the greenhouse to Lv2,</black>"
          - "<black>craft the blueprint on the tools page.</black>"
          - "<dark_green>Moss ×9 base</dark_green><black> +</black>"
          - "<dark_green>azalea bushes at the corners</dark_green><black> +</black>"
          - "<dark_green>a central composter</dark_green><black> to claim.</black>"
          - "<black>Place a chest above as the input bin.</black>"
      # Phenomenon Condenser tutorial page: shown after the Attunement Engine, introducing
      # the Study Lv2 Moonlight scholarly-condensing machine.
      - requires: [ phenomenon_condenser ]
        title: "Phenomenon Condenser"
        done:
          - "<dark_green><bold>✔ Phenomenon Condenser</bold></dark_green>"
          - ""
          - "<black>A Moonlight-driven material condenser.</black>"
          - "<black>Rotten flesh→leather, paper→book,</black>"
          - "<black>ink sac→black dye, and more.</black>"
        hint:
          - "<dark_gray>· Phenomenon Condenser</dark_gray>"
          - ""
          - "<black>Upgrade the study to Lv2,</black>"
          - "<black>craft the blueprint on the tools page.</black>"
          - "<dark_aqua>Deepslate bricks ×9 base</dark_aqua><black> +</black>"
          - "<dark_aqua>bookshelves at the corners</dark_aqua><black> +</black>"
          - "<dark_aqua>a central lectern</dark_aqua><black> to claim.</black>"
          - "<black>Place a chest above as the material bin.</black>"
      # Attunement Engine tutorial page (v0.9.2 #1): shown after you have a Nexus (touched the
      # radiance network), explaining its purpose and use.
      - requires: [ energy_nexus ]
        title: "Attunement Engine"
        done:
          - "<dark_green><bold>✔ Attunement Engine</bold></dark_green>"
          - ""
          - "<black>Let the base take over </black><gold>material processing</gold><black>,</black>"
          - "<black>no more clicking cell by cell in the workshop.</black>"
          - ""
          - "<black>Build it within 48 blocks of a </black><dark_aqua>Radiance Nexus</dark_aqua>"
          - "<black>(blueprint crafted at Workshop Lv2),</black>"
          - "<black>right-click the central blast furnace to claim it.</black>"
          - "<black>Place a chest above as the input bin,</black>"
          - "<black>and drop in cobblestone and the like.</black>"
          - ""
          - "<black>Every few seconds it takes one input,</black>"
          - "<black>spends a little Nexus Sunlight, returns the product.</black>"
        hint:
          - "<dark_gray>· Attunement Engine</dark_gray>"
          - ""
          - "<black>Raise a Radiance Nexus first;</black>"
          - "<black>afterwards the base can take over processing.</black>"
      # Infernal Ruins tutorial page: shown only after nether_gate (set foot in the Nether).
      - requires: [ infernal_relay ]
        title: "Infernal Ruins"
        done:
          - "<dark_green><bold>✔ Infernal Ruins</bold></dark_green>"
          - ""
          - "<dark_red>An ancient soul-fire ruin,</dark_red>"
          - "<dark_red>the relay ruin claimed.</dark_red>"
          - ""
          - "<black>Next: build the</black>"
          - "<gold>Ember Forge</gold><black> to refine Infernal Shards.</black>"
        hint:
          - "<dark_gray>· Infernal Ruins</dark_gray>"
          - ""
          - "<black>Venture deep into the Nether for a ruin:</black>"
          - "<dark_red>a cracked nether-brick base</dark_red>"
          - "<dark_red>+ corner pillars + soul fire</dark_red>"
          - "<black>. Right-click the fire to claim it.</black>"
      # Infernal Shard tutorial page: appears on first obtaining one.
      - requires: [ infernal_shard ]
        title: "Infernal Shard"
        done:
          - "<dark_green><bold>✔ Infernal Shard</bold></dark_green>"
          - ""
          - "<gold>Embers</gold><black> left by flame,</black>"
          - "<black>congealed into a shard.</black>"
          - ""
          - "<black>Dropped by Nether creatures,</black>"
          - "<black>or refined at the Ember Forge.</black>"
        hint:
          - "<dark_gray>· Infernal Shard</dark_gray>"
          - ""
          - "<black>In the Nether, hunt</black>"
          - "<gold>blazes, ghasts</gold>"
          - "<gold>or wither skeletons</gold><black> to obtain it.</black>"
      # Ember Forge tutorial page: appears after building one and first right-click.
      - requires: [ ember_forge ]
        title: "Ember Forge"
        done:
          - "<dark_green><bold>✔ Ember Forge</bold></dark_green>"
          - ""
          - "<gold>A nether-brick base</gold>"
          - "<black>+ corner polished blackstone brick pillars</black>"
          - "<black>+ a central magma block.</black>"
          - ""
          - "<black>Hold Ember Bloom and right-click,</black>"
          - "<black>refine Infernal Shards with Sunlight.</black>"
        hint:
          - "<dark_gray>· Ember Forge</dark_gray>"
          - ""
          - "<black>After claiming the Infernal Ruins,</black>"
          - "<gold>9 nether bricks (3×3)</gold>"
          - "<black>for the base, raise</black>"
          - "<gold>polished blackstone brick pillars</gold><black> at the corners,</black>"
          - "<gold>a magma block in the centre</gold><black>.</black>"
          - "<black>Empty-hand right-click to view the recipe.</black>"

