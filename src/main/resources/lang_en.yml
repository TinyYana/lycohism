    item-lore:
      - "<dark_gray>Records the natural phenomena you have felt.</dark_gray>"
      - "<dark_gray>Right-click to read.</dark_gray>"
    cover:
      - "<dark_purple><bold>Attunement Manual</bold></dark_purple>"
      - ""
      - "<black>The world hides natural responses.</black>"
      - ""
      - "<gold>Time, weather,</gold>"
      - "<gold>height and biome.</gold>"
    entries:
      - requires: [ morning_dew ]
        title: "Morning Dew"
        done:
          - "<dark_green><bold>✔ Morning Dew</bold></dark_green>"
          - ""
          - "<gold>At dawn</gold><black> break grass and leaves.</black>"
          - "<black>It forms an early attunement material.</black>"
        hint:
          - "<dark_gray>· Morning Dew</dark_gray>"
          - ""
          - "<gold>At dawn</gold><black> head to the grassland.</black>"
          - "<black>Harvest grass and flowers.</black>"
      - requires: [ dew_light ]
        title: "Dewlight Vial"
        done:
          - "<dark_green><bold>✔ Dewlight Vial</bold></dark_green>"
          - ""
          - "<gold>Right-click</gold><black> to use the vial.</black>"
          - "<black>Gain two minutes of night vision.</black>"
        hint:
          - "<dark_gray>· Dewlight Vial</dark_gray>"
          - ""
          - "<gold>Glass bottle + Morning Dew</gold>"
          - "<black>craft at a crafting table.</black>"
