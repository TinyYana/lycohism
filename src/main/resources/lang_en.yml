# Lycohism text settings (English)
# All player-facing text lives here so wording, tone and colours can change without
# recompiling. Format is MiniMessage: https://docs.advntr.dev/minimessage/format.html
#
# Note: book pages use a light parchment background. Use dark colours (black / dark_gray /
# dark_green / dark_purple / dark_aqua / dark_red ...) so the text stays readable —
# avoid white / gray / yellow on book pages.

# ── GUI appearance (shared by every facility menu for a consistent look) ──────────────
gui:
  filler-material: GRAY_STAINED_GLASS_PANE
  header-material: PINK_PETALS
  back-material: ARROW
  breadcrumb-separator: " ▸ "
  back: "<white>Back<reset>"
  back-lore:
    - "<dark_gray>Return to the previous page.<reset>"

  common:
    requires: "<gray>Requires:<reset>"
    cost-line: "<gray>· {item} <white>x{amount}<reset><reset>"
    cost-hidden: "<dark_gray>· <obfuscated>unknown material<reset> <gray>x{amount}<reset><reset>"
    cost-hidden-hint: "<dark_gray>Pick up the unknown material once and its name will reveal itself.<reset>"
    cost-plain: "{item} x{amount}"
    click-craft: "<yellow>Click to craft.<reset>"
    click-repair: "<yellow>Click to repair.<reset>"
    click-enchant: "<yellow>Click to apply Mending.<reset>"
    click-cultivate: "<dark_gray>Click to cultivate.<reset>"

  # Facility upgrade button (shared by all three facilities).
  facility:
    upgrade: "<yellow>Upgrade this facility → Lv{level}<reset>"
    # {structure} upgrade-structure name, {sun}/{moon} Nexus radiance cost.
    upgrade-lore:
      - "<gray>Build the facility into its <white>{structure}<reset> rigid structure to reach Lv2.<reset>"
      - "<gray>Flow: <gold>Sun/Moon Tower<reset> → <yellow>Relay<reset> → <aqua>Radiance Nexus<reset> → upgrade here.<reset>"
      - "<gray>Costs Nexus <gold>{sun} Sunlight<reset> / <aqua>{moon} Moonlight<reset>.<reset>"
    # Lv2→Lv3: unlocked with an Eclipse Crystal from the Eclipse Warden, no upgrade structure needed.
    upgrade-lore-3:
      - "<gray>Use an <yellow>Eclipse Crystal<reset> to raise the facility to Lv3 — its third tier.<reset>"
      - "<gray>The crystal drops from summoning and defeating the <white>Eclipse Warden<reset> in the <white>Eclipse Realm<reset>.<reset>"
      - "<gray>Costs Nexus <gold>{sun} Sunlight<reset> / <aqua>{moon} Moonlight<reset>.<reset>"
    upgrade-action: "<yellow>Stand by the upgrade structure to upgrade; for Lv3 you only need the Eclipse Crystal and radiance.<reset>"
    # Shown in place of the upgrade button once a facility is maxed (Lv3).
    maxed: "<yellow>Fully attuned — Lv3<reset>"
    maxed-lore:
      - "<gray>This facility is attuned to its peak — there is no higher tier.<reset>"
      - "<dark_gray>Tier-3 content is reachable beside the upgrade structure (or via command).<reset>"

  workshop:
    root: "<dark_aqua>Workshop<reset>"
    broken: "<dark_gray>Workshop (broken)<reset>"
    tools-leaf: "<aqua>Craft Tools<reset>"
    materials-leaf: "<aqua>Process Materials<reset>"
    tools-lore:
      - "<gray>Craft living tools with their full use and cost shown.<reset>"
    materials-lore:
      - "<gray>Convert common building materials in batches.<reset>"
    repair: "<yellow>Repair Workshop<reset>"
    repair-lore:
      - "<gray>The workshop must be repaired before it works.<reset>"
    status: "<aqua>Workshop Status<reset>"
    status-lore:
      - "<gray>Level <white>{level}<reset> / 3<reset>"
      - "<gray>Available: tool crafting, material processing, Mending.<reset>"
      - "<dark_gray>Click to view the full details in chat.<reset>"
    mending: "<aqua>Rain-Breath Enchant<reset>"
    mending-lore:
      - "<gray>Permanently apply Mending to your main-hand tool.<reset>"
      - "<gray>Also consumes <white>{levels}<reset> experience levels.<reset>"
    mending-lore-2:
      - "<gray>Permanently apply Mending<gold> + Unbreaking III<reset> to your main-hand tool.<reset>"
      - "<gray>Also consumes <white>{levels}<reset> experience levels.<reset>"
      - "<dark_gray>Upgraded workshop bonus.<reset>"
    mending-lore-3:
      - "<gray>Permanently apply Mending<gold> + Unbreaking III<reset> to your main-hand tool.<reset>"
      - "<gray>Plus <red>Sharpness / Power / Protection / Efficiency<reset> by item type.<reset>"
      - "<gray>Also consumes <white>{levels}<reset> experience levels.<reset>"
      - "<dark_gray>Tier-3 (Eclipse) combat enhancement.<reset>"
    conversion: "<gray>{input} → {output}<reset>"
    conversion-n: "<gray>{input} → {output} ×{amount}<reset>"
    conversion-action: "<dark_gray>Click to convert a whole batch from your inventory.<reset>"
    output-name: "<aqua>{item}<reset>"
    header-main: "<aqua>Workshop<reset>"
    header-main-lore:
      - "<gray>A repaired crafting post.<reset>"
      - "<gray>Choose one of the options below.<reset>"
    header-broken-lore:
      - "<gray>The workshop still sleeps.<reset>"
      - "<gray>Gather the materials and click to wake it.<reset>"
    header-tools-lore:
      - "<gray>Craft living tools from natural materials.<reset>"
    header-materials-lore:
      - "<gray>Convert building materials from your inventory in batches.<reset>"
    header-materials-lore-2:
      - "<gray>Convert building materials from your inventory in batches.<reset>"
      - "<gold>Upgrade the workshop: double the yield and unlock more processing.<reset>"

  study:
    root: "<dark_aqua>Study<reset>"
    sealed: "<dark_gray>Study (dormant)<reset>"
    header-main: "<aqua>Study<reset>"
    header-main-lore:
      - "<gray>A record of the Path of Attunement you have walked.<reset>"
      - "<gray>Choose a category below.<reset>"
    header-sealed-lore:
      - "<gray>The scattered records are not yet in order.<reset>"
      - "<gray>Gather the materials and click to set the study in order.<reset>"
    repair: "<yellow>Set the Study in Order<reset>"
    repair-lore:
      - "<gray>Bring the scattered nature records back into order.<reset>"
    # ── Categories (the three entries on root) ─────────────────────────────
    books-leaf: "<aqua>Books<reset>"
    books-lore:
      - "<gray>Read the manual, compendium and discovery records.<reset>"
    tools-leaf: "<light_purple>Memory Tools<reset>"
    tools-lore:
      - "<gray>Craft tools for observation and record-keeping.<reset>"
    map-mark: "<gray>Mark Nearest Energy Tower<reset>"
    map-mark-lore:
      - "<gray>Gives you a locked map centred on the nearest energy tower.<reset>"
      - "<dark_gray>Unlocked by upgrading the study.<reset>"
    map-mark-name: "<gray>{name} Location Map<reset>"
    forecast: "<yellow>Regional Forecast<reset>"
    forecast-lore:
      - "<gray>Read out every natural phenomenon harvestable here and now.<reset>"
      - "<dark_gray>Tier-3 (Eclipse) exploration enhancement.<reset>"
    progress-leaf: "<aqua>Path of Attunement<reset>"
    progress-lore:
      - "<gray>Look back on the road walked and see the next step.<reset>"
    expedition-leaf: "<aqua>Expedition<reset>"
    expedition-lore:
      - "<gray>Unlock and travel directly to an expedition site.<reset>"
    header-books-lore:
      - "<gray>Read through the attunement records you have gathered.<reset>"
    header-tools-lore:
      - "<gray>Craft memory tools from natural materials.<reset>"
    header-expedition-lore:
      - "<gray>Follow the rain-marks beyond the Overworld.<reset>"
    # ── Books leaf ──────────────────────────────────────────
    manual: "<light_purple>Attunement Manual<reset>"
    manual-lore:
      - "<gray>See the next step you can take right now.<reset>"
    compendium: "<aqua>Nature Compendium<reset>"
    compendium-lore:
      - "<gray>View the natural phenomena you have discovered.<reset>"
    record: "<green>Discovery Record<reset>"
    record-lore:
      - "<gray>Look back on the attunements you have completed.<reset>"
    # ── Expedition leaf ──────────────────────────────────────────
    expedition-enter: "<aqua>Enter the Rainfall Forest<reset>"
    expedition-enter-name: "<aqua>Travel to {name}<reset>"
    expedition-locked-name: "<dark_gray>{name} (locked)<reset>"
    expedition-enter-lore:
      - "<gray>Unlocked. Click to enter the expedition world directly.<reset>"
      - "<dark_gray>No extra entry item is given.<reset>"
    expedition-return: "<white>Return to Departure Point<reset>"
    expedition-return-lore:
      - "<gray>Click to return to where you were before the expedition.<reset>"
    gate-locked: "<dark_gray>Rainfall Forest (locked)<reset>"
    gate-locked-lore:
      - "<gray>The rain-marks are still faint; the entrance is not yet unlocked.<reset>"
      - "<gray>Set foot in the <white>Nether<reset>, then come back and try again.<reset>"
    # The Eclipse Realm is where the sun and moon lines converge; when locked, state the
    # solution plainly so players know to finish both expedition lines first.
    gate-locked-lore-eclipse_realm:
      - "<gray>Sun and moon have not yet eclipsed here; the gate stays shut.<reset>"
      - "<gray>First walk both the <gold>Tidal Depths<reset> (sun) and <aqua>Moonless Waste<reset> (moon) lines;<reset>"
      - "<gray>with both attunements complete, the gate to the eclipse will appear.<reset>"
    status: "<aqua>Study Status<reset>"
    status-lore:
      - "<gray>Level <white>{level}<reset> / 3<reset>"
      - "<gray>Categories: Books, Memory Tools, Expedition.<reset>"
      - "<dark_gray>Click to view the full details in chat.<reset>"
  greenhouse:
    root: "<dark_aqua>Greenhouse<reset>"
    broken: "<dark_gray>Greenhouse (overgrown)<reset>"
    cultivate-leaf: "<green>Cultivate<reset>"
    tools-leaf: "<green>Plant Tools<reset>"
    cultivate-lore:
      - "<gray>Trade Flower Vein for common and rare plants.<reset>"
    tools-lore:
      - "<gray>Craft tools to ripen, harvest and replant.<reset>"
    repair: "<yellow>Reclaim Greenhouse<reset>"
    repair-lore:
      - "<gray>Make the overgrown greenhouse fit to grow in again.<reset>"
    status: "<green>Greenhouse Status<reset>"
    status-lore:
      - "<gray>Level <white>{level}<reset> / 3<reset>"
      - "<gray>Available: Flower Vein & Moss Bloom cultivation, Flower Vein Shears, Moss Balm and Moss Fertilizer.<reset>"
      - "<dark_gray>Click to view the full details in chat.<reset>"
    output-name: "<green>{item} x{amount}<reset>"
    header-main: "<green>Greenhouse<reset>"
    header-main-lore:
      - "<gray>A place for plants and Flower Vein to settle.<reset>"
      - "<gray>Choose one of the options below.<reset>"
    header-broken-lore:
      - "<gray>The greenhouse is still overgrown.<reset>"
      - "<gray>Gather the materials and click to reclaim it.<reset>"
    header-cultivate-lore:
      - "<gray>Cultivate plant materials with Flower Vein.<reset>"
    header-tools-lore:
      - "<gray>Craft plant-line tools.<reset>"

  admin:
    title: "<dark_purple>Lycohism Admin<reset>"
    header: "<light_purple>Admin Tools<reset>"
    header-lore:
      - "<gray>Version <white>{version}<reset> | Debug {debug}<reset>"
      - "<gray>Test items, stages and expeditions in one place.<reset>"
    materials: "<aqua>Give Natural Materials<reset>"
    materials-lore:
      - "<gray>Pick a Lycohism natural material.<reset>"
    tools: "<light_purple>Give Tools<reset>"
    tools-lore:
      - "<gray>Pick a tool or test item.<reset>"
    stages: "<yellow>Adjust Game Stage<reset>"
    stages-lore:
      - "<gray>Set a chapter as the current progress.<reset>"
    expedition: "<aqua>Switch Expedition World<reset>"
    expedition-lore:
      - "<gray>Enter ignoring unlock gates; return if already on an expedition.<reset>"
    reload: "<green>Reload Config<reset>"
    reload-lore:
      - "<gray>Re-read config, content and progression.<reset>"
    facilities: "<aqua>Facility Levels<reset>"
    facilities-lore:
      - "<gray>Quickly set your own facility levels to test repair / upgrade / Lv2 content.<reset>"
    facilities-header-lore:
      - "<gray>Click to cycle that facility's level (0→1→2→3→0).<reset>"
    facility-level: "<gray>Current level: <white>{level}<reset> / 3<reset>"
    click-facility: "<yellow>Click to change level.<reset>"
    sounds: "<aqua>Sound Test Set<reset>"
    sounds-lore:
      - "<gray>Audition four note-block melodies.<reset>"
    sounds-header-lore:
      - "<gray>Each uses the same scale so you can compare timbres.<reset>"
    sound-chime: "<light_purple>Chime<reset>"
    sound-harp: "<gold>Harp<reset>"
    sound-flute: "<green>Flute<reset>"
    sound-bell: "<yellow>Bell<reset>"
    click-sound:
      - "<yellow>Click to audition.<reset>"
    items-header-lore:
      - "<gray>Click an item to receive one directly.<reset>"
    stages-header-lore:
      - "<gray>Click a chapter to set it as the current stage.<reset>"
      - "<dark_gray>The glowing compass is the current stage.<reset>"
    item-id: "<dark_gray>ID: {id}<reset>"
    stage-id: "<dark_gray>Stage ID: {id}<reset>"
    click-give: "<yellow>Click to receive.<reset>"
    click-stage: "<yellow>Click to switch.<reset>"
    expedition-header-lore:
      - "<gray>Pick an expedition world to travel to directly (ignoring gates).<reset>"
    expedition-id: "<dark_gray>Expedition ID: {id}<reset>"
    click-expedition: "<yellow>Click to travel.<reset>"
    expedition-return: "<white>Return to Overworld<reset>"
    expedition-return-lore:
      - "<gray>If on an expedition world, click to return to your departure point.<reset>"

  nexus:
    title: "<yellow>Radiance Nexus<reset>"
    header: "<gold>Radiance Nexus<reset>"
    header-lore:
      - "<gray>Your base's radiance store.<reset>"
      - "<gray>Flow: <gold>Sun/Moon Tower<reset> → <yellow>Relay<reset> → <aqua>Nexus<reset> → upgrade facilities.<reset>"
      - "<gray>Owner: <white>{owner}<reset> | Members: <white>{members}<reset><reset>"
      - "<dark_gray>Use /lycohism nexus share <player> to share access.<reset>"
    sun: "<gold>☀ Sunlight<reset>"
    sun-lore:
      - "<gray>Stored <white>{value}<reset> / {cap}<reset>"
      - "<dark_gray>Fed in by Sun Towers through Relays.<reset>"
    moon: "<aqua>☾ Moonlight<reset>"
    moon-lore:
      - "<gray>Stored <white>{value}<reset> / {cap}<reset>"
      - "<dark_gray>Fed in by Moon Towers through Relays.<reset>"

  # Standalone UI for the Path of Attunement (progression line).
  progression:
    title: "<dark_aqua>Path of Attunement<reset>"
    header: "<aqua>Path of Attunement<reset>"
    header-lore:
      - "<gray>The road you have walked, and the next step.<reset>"
      - "<gray>Completed <white>{done}<reset> / {total}<reset>"
    advancement-root-title: "Lycohism"
    advancement-root-description: "A tale of attuning to nature."
    advancement-intro-title: "The Tale You Know"
    advancement-intro-description: "The world still holds natural responses you have yet to notice."
    done-name: "<green>✔ {title}<reset>"
    unlocked-label: "<aqua>Unlocked:<reset>"
    current-name: "<yellow>▶ {title}<reset>"
    objective-label: "<gold>Current objective:<reset>"
    locked-name: "<dark_gray>???<reset>"
    locked-lore:
      - "<dark_gray>You have not reached this step yet.<reset>"
    upcoming-name: "<dark_gray>⌛ {title}<reset>"

