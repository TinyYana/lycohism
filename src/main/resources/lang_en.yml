items:
  dew_light:
    name: "<white>Dewlight Vial<reset>"
    lore:
      - "<gray>Grants two minutes of night vision in the dark.<reset>"
      - "<dark_gray>Right-click to consume; leaves an empty glass bottle.<reset>"
  flower_bookmark:
    name: "<white>Flower Bookmark<reset>"
    lore:
      - "<gray>Remembers a place, then guides you back to it.<reset>"
      - "<dark_gray>Shift+right-click to remember, right-click to be guided.<reset>"
  stonework_hammer:
    name: "<white>Stonework Hammer<reset>"
    lore:
      - "<gray>Makes stone processing more convenient.<reset>"
      - "<dark_gray>First right-click previews; right-click again within 5 seconds to confirm.<reset>"
  stonework_hammer_tier_2:
    name: "<yellow>Stonework Hammer II<reset>"
    lore:
      - "<gray>Right-click stone to shape a connected 3×3 face at once.<reset>"
      - "<dark_gray>First right-click previews; right-click again to confirm the 3×3 shaping.<reset>"
  building_wand:
    name: "<white>Building Wand<reset>"
    lore:
      - "<gray>First right-click previews; right-click again within 5 seconds to confirm a line placement.<reset>"
      - "<dark_gray>Consumes the same vanilla blocks from your inventory; forged at the Radiance Altar.<reset>"
  building_wand_tier_2:
    name: "<aqua>Building Wand II<reset>"
    lore:
      - "<gray>First right-click previews; right-click again to confirm placement.<reset>"
      - "<gray>Shift+right-click (even into the air) to switch: line / wall / floor / column.<reset>"
      - "<dark_gray>Consumes the same vanilla blocks from your inventory.<reset>"
  rain_bandage:
    name: "<aqua>Rain Bandage<reset>"
    lore:
      - "<gray>A simple bandage steeped in Rain Breath.<reset>"
      - "<dark_gray>Right-click to restore a little health; consumed on use.<reset>"
  flower_vein_shears:
    name: "<light_purple>Flower Vein Shears<reset>"
    lore:
      - "<gray>Makes immature crops grow instantly.<reset>"
      - "<dark_gray>Right-click again once mature to harvest and replant.<reset>"
  wind_vane:
    name: "<white>Wind Vane<reset>"
    lore:
      - "<gray>Reads the current natural harvest conditions.<reset>"
      - "<dark_gray>While held in either hand, keeps showing the environment readout.<reset>"
  moon_pouch:
    name: "<white>Moon Pouch<reset>"
    lore:
      - "<gray>Automatically stores natural phenomena you pick up.<reset>"
      - "<dark_gray>Right-click to release everything inside.<reset>"
  leyline_probe:
    name: "<gray>Leyline Probe<reset>"
    lore:
      - "<gray>Makes Leyline Sand respond to nearby ore veins.<reset>"
      - "<dark_gray>While held in either hand, keeps showing the nearest ore vein.<reset>"
  rain_gate:
    name: "<aqua>Rainmark Gate<reset>"
    lore:
      - "<gray>Follow the rain-marks to a forest in the rain.<reset>"
      - "<dark_gray>Right-click in the Overworld to travel; right-click in the expedition world to return.<reset>"
      - "<dark_gray>You must first set foot in the Nether for the rain-marks to answer.<reset>"
  moss_balm:
    name: "<gray>Moss Balm<reset>"
    lore:
      - "<gray>Right-click to apply for a gentle stretch of Regeneration.<reset>"
      - "<dark_gray>Brewed in the greenhouse only from Rainfall Forest Moss Bloom.<reset>"
  moss_fertile:
    name: "<gray>Moss Fertilizer<reset>"
    lore:
      - "<gray>Right-click a plant to grow a small patch of crops and vegetation around it.<reset>"
      - "<dark_gray>Brewed in the greenhouse only from Rainfall Forest Moss Bloom.<reset>"
  energy_crystal:
    name: "<yellow>Energy Crystal<reset>"
    lore:
      - "<gray>Held in your inventory, it absorbs overflowing radiance.<reset>"
      - "<gray>Once your energy pool is full, the surplus is stored here.<reset>"
      - "<dark_gray>Right-click to pour the crystal's energy back into your own pool.<reset>"
  radiant_focus:
    name: "<yellow>Radiant Focus<reset>"
    lore:
      - "<gray>Right-click to draw <gold>Sunlight<reset>: a sun blessing of Fire Resistance and Strength.<reset>"
      - "<gray>Shift+right-click to draw <aqua>Moonlight<reset>: a moon blessing of Night Vision and Slow Falling.<reset>"
      - "<dark_gray>Forged at the Radiance Altar from gold ingots + Moon Core + Energy Crystal.<reset>"
  solar_pick:
    name: "<yellow>Solar Pickaxe<reset>"
    lore:
      - "<gray>Right-click to spend <gold>Sunlight<reset> for a burst of Haste.<reset>"
      - "<dark_gray>Unlocked at Workshop Lv2.<reset>"
  star_compass:
    name: "<gray>Star Compass<reset>"
    lore:
      - "<gray>Right-click to point to the direction and distance of the nearest <aqua>energy tower<reset>.<reset>"
      - "<dark_gray>Crafted at the Study (Lv1).<reset>"
  lunar_spore:
    name: "<white>Lunar Spore<reset>"
    lore:
      - "<gray>Right-click a plant to spend <aqua>Moonlight<reset> and bone-meal an area.<reset>"
      - "<dark_gray>Unlocked at Greenhouse Lv2.<reset>"
  blueprint:
    name: "<aqua>{structure} Blueprint<reset>"
    lore:
      - "<gray>Right-click facing the ground: show a <green>ghost outline<reset> (green = present, red = missing).<reset>"
      - "<gray>Shift+right-click: <white>build directly<reset> using materials from your inventory.<reset>"
      - "<dark_gray>The design for building the {structure}.<reset>"
    materials: "<white>Blocks required:<reset>"
    material-line: "<gray>• {material} ×{count}<reset>"

# Text for each chapter of the Path of Attunement (matches stage ids in progression.yml).
progression:
  stages:
    awakening:
      title: "<white>First Morning Dew<reset>"
      lore:
        - "<gray>The first drop of natural power at dawn.<reset>"
      details:
        - "<gray>Morning Dew harvesting and the earliest natural recipes.<reset>"
      hint: "<gray>At dawn, harvest Morning Dew among grass and flowers.<reset>"
    workshop:
      title: "<white>Wake the Workshop<reset>"
      lore:
        - "<gray>Grow the first function out of your base.<reset>"
      details:
        - "<gray>Tool crafting, material processing and Rain-Breath enchanting.<reset>"
      hint: "<gray>Gather the materials and repair the workshop at a crafting table.<reset>"
    first_tools:
      title: "<white>Your First Living Tool<reset>"
      lore:
        - "<gray>Nature begins to solve the small troubles of survival for you.<reset>"
      details:
        - "<gray>Dewlight Vial: grants two minutes of night vision once consumed.<reset>"
      hint: "<gray>Craft a Dewlight Vial at the workshop using Morning Dew.<reset>"
    rain:
      title: "<white>The Breath of Rain<reset>"
      lore:
        - "<gray>A rainy day is no longer just waiting.<reset>"
      details:
        - "<gray>Harvest Rain Breath to grow crops and craft restoratives.<reset>"
      hint: "<gray>On a rainy day, harvest Rain Breath by water and in forests.<reset>"
    study:
      title: "<white>Open the Study<reset>"
      lore:
        - "<gray>Begin recording the road you have walked.<reset>"
      details:
        - "<gray>The manual, compendium, discovery record and Path of Attunement.<reset>"
      hint: "<gray>Gather the materials and set the study in order.<reset>"
    greenhouse:
      title: "<white>Life in the Greenhouse<reset>"
      lore:
        - "<gray>Plants and farming find a home.<reset>"
      details:
        - "<gray>Plant cultivation, Flower Vein Shears, Moss Balm and Moss Fertilizer.<reset>"
      hint: "<gray>Gather the materials and reclaim the greenhouse.<reset>"
    night:
      title: "<white>Memory of the Night<reset>"
      lore:
        - "<gray>The night and the moonlight are worth lingering on.<reset>"
      details:
        - "<gray>Moon Dew, and crafting the Wind Vane and Moon Pouch.<reset>"
      hint: "<gray>On a clear full-moon night, harvest Moon Dew.<reset>"
    nether_gate:
      title: "<white>Toward the Nether<reset>"
      lore:
        - "<gray>A further road needs deeper footprints.<reset>"
      details:
        - "<gray>The Rainfall Forest entrance in the study.<reset>"
      hint: "<gray>Set foot in the Nether once, and the study's expedition entrance unlocks.<reset>"
    infernal_relay:
      title: "<red>Infernal Ruins<reset>"
      lore:
        - "<gray>An ancient relay ruin, its soul fire still burning.<reset>"
      details:
        - "<gray>Deep in the Nether, find a ruin: a cracked nether-brick platform + corner pillars + central soul fire.<reset>"
        - "<gray>Right-click the central soul fire to claim the ruin; afterwards you can refine Infernal Shards from Ember Bloom at the Radiance Altar.<reset>"
      hint: "<gray>Venture deep into the Nether and find an ancient ruin still burning with soul fire.<reset>"
    ember_forge:
      title: "<red>Ember Forge<reset>"
      lore:
        - "<gray>Refining Nether minerals needs a deeper fire.<reset>"
      details:
        - "<gray>Ember Forge: a 9-block nether-brick base + polished blackstone brick pillars at the corners + a central magma-block controller.<reset>"
        - "<gray>Hold Ember Bloom and right-click the magma block to refine Infernal Shards from blaze rods + nether wart, spending Sunlight.<reset>"
      hint: "<gray>Build the Ember Forge (a 3×3 nether-brick base + corner polished blackstone brick pillars + central magma block) and empty-hand right-click to view the recipe.<reset>"
    radiant_vein:
      title: "<gold>Nether Radiant Vein<reset>"
      lore:
        - "<gray>Within gilded blackstone hides a crystal this world does not have.<reset>"
      details:
        - "<gray>Radiant Ore: a Lycohism-exclusive mineral, used for tier-2 tools and altar creations.<reset>"
      hint: "<gray>Explore newly generated Nether chunks and mine the gilded blackstone veins in the rock layers.<reset>"
    expedition:
      title: "<white>The First Expedition<reset>"
      lore:
        - "<gray>Step out of the Overworld, into the forest after the rain.<reset>"
      details:
        - "<gray>The Rainfall Forest and its exclusive material, Moss Bloom.<reset>"
      hint: "<gray>Travel to the Rainfall Forest from the study's expedition screen.<reset>"
    expedition_yield:
      title: "<white>Gifts Brought Home<reset>"
      lore:
        - "<gray>The spoils of an expedition become something only found there.<reset>"
      details:
        - "<gray>Brew Moss Balm and Moss Fertilizer from Moss Bloom.<reset>"
      hint: "<gray>Brew Moss Balm from Moss Bloom in the greenhouse.<reset>"
    radiance:
      title: "<white>Radiance Emerges<reset>"
      lore:
        - "<gray>The light of sun and moon can begin to be gathered.<reset>"
      details:
        - "<gray>Energy Crystal; passively gather Sunlight and Moonlight under the open sky.<reset>"
      hint: "<gray>Craft an Energy Crystal at the workshop, then stand under the open sky outdoors to gather energy.<reset>"
    solar_tower:
      title: "<gold>Tower of the Sun<reset>"
      lore:
        - "<gray>Follow the sunlight and find the first high tower.<reset>"
      details:
        - "<gray>Sun Tower: a tall rigid landmark that supplies Sunlight under open daytime sky.<reset>"
      hint: "<gray>Find a naturally generated <gold>Sundial (Sun Tower)<reset> around the world; approach it to be recorded. (Admins can /lycohism build sun_tower.)<reset>"
    lunar_tower:
      title: "<aqua>Tower of the Moon<reset>"
      lore:
        - "<gray>Follow the moonlight and find the matching high tower.<reset>"
      details:
        - "<gray>Moon Tower: mirror of the Sun Tower, supplying Moonlight under open night sky.<reset>"
      hint: "<gray>Find a naturally generated <aqua>Moondial (Moon Tower)<reset> and approach it to be recorded; it may appear in the Moonless Waste or the Overworld.<reset>"
    lunar_waste:
      title: "<white>Into the Endless Night<reset>"
      lore:
        - "<gray>A waste without dawn is the source of the moon's power.<reset>"
      details:
        - "<gray>Moonless Waste: gather Moonlight all day, and the source of the Moon Core.<reset>"
      hint: "<gray>Travel to the Moonless Waste from the study's expedition screen.<reset>"
    energy_altar:
      title: "<white>The Radiance Altar<reset>"
      lore:
        - "<gray>Raise an altar, and higher refining begins here.<reset>"
      details:
        - "<gray>Radiance Altar: drop materials, hold a catalyst and right-click, spending radiance to refine.<reset>"
      hint: "<gray>Build the Radiance Altar (a central enchanting table + a ring of deepslate pedestals); empty-hand right-click it to view its use and recipes.<reset>"
    moon_attunement:
      title: "<white>Attunement of the Moon<reset>"
      lore:
        - "<gray>Forge the Moon Core you brought back into usable power.<reset>"
      details:
        - "<gray>Radiant Focus: draw sun/moon blessings at the altar with Sunlight/Moonlight.<reset>"
      hint: "<gray>At the Radiance Altar, hold gold ingots, drop in a Moon Core and Energy Crystal, and spend radiance to forge the Radiant Focus.<reset>"
    tidal_depths:
      title: "<dark_aqua>Dive the Warm Sea<reset>"
      lore:
        - "<gray>The sea of endless day is the source of the sun's power.<reset>"
      details:
        - "<gray>Tidal Depths: gather Sunlight at double rate by day, the source of the Sun Core (mirror of the Moonless Waste).<reset>"
      hint: "<gray>Travel to the Tidal Depths from the study's expedition screen.<reset>"
    solar_attunement:
      title: "<yellow>Attunement of the Sun<reset>"
      lore:
        - "<gray>Forge the Sun Core you brought back into usable power.<reset>"
      details:
        - "<gray>Solar Pickaxe: draw Haste with Sunlight; the sun line mirrors the moon attunement.<reset>"
      hint: "<gray>After upgrading the workshop, craft the Solar Pickaxe at the workshop.<reset>"
    radiant_nexus:
      title: "<gold>Radiance Base<reset>"
      lore:
        - "<gray>Gather the scattered radiance into one core.<reset>"
      details:
        - "<gray>Radiance Nexus: your base's energy store, shareable with companions.<reset>"
        - "<gray>Energy flow: <gold>Sun/Moon Tower<reset> (produce) → <yellow>Relay<reset> (carry) → <aqua>Nexus<reset> (store).<reset>"
      hint: "<gray>Build a Radiance Nexus and right-click the beacon core to claim it; place it within 48 horizontal blocks of a tower and energy flows in (you'll see a beam when close).<reset>"
    energy_grid:
      title: "<yellow>The Radiance Network<reset>"
      lore:
        - "<gray>Use Relays to string towers and the Nexus into one web.<reset>"
      details:
        - "<gray>Energy Relay: carries a tower's energy to a farther Nexus, 48 blocks per hop.<reset>"
        - "<gray>Towers only produce in their matching period (sun by day / moon by night) and under open sky.<reset>"
      hint: "<gray>When a tower is too far from the Nexus, build and activate an Energy Relay between them; a flowing beam when nearby means energy is moving.<reset>"
    facility_growth:
      title: "<white>Growth of the Facilities<reset>"
      lore:
        - "<gray>Feed the radiance you have gathered back into the base itself.<reset>"
      details:
        - "<gray>Upgrade = build the facility's 'upgrade structure' + spend Nexus radiance.<reset>"
        - "<gray>Afterwards, access the full Lv2 features beside the upgrade structure or via command.<reset>"
      hint: "<gray>Build your Workshop/Study/Greenhouse into the matching upgrade structure, then click 'Upgrade' on the facility page beside it (or /lycohism upgrade).<reset>"
    attunement_engine:
      title: "<white>Attunement Engine<reset>"
      lore:
        - "<gray>Let the base take over the repetitive material processing.<reset>"
      details:
        - "<gray>Build an Attunement Engine near a Radiance Nexus (blueprint crafted at Workshop Lv2), then right-click the central blast furnace to claim it.<reset>"
        - "<gray>Place a chest directly above as the input bin; every few seconds it takes one input, spends Nexus Sunlight, and returns the product to the chest.<reset>"
      hint: "<gray>At Workshop Lv2, craft an 'Attunement Engine Blueprint', build it within 48 blocks of a Nexus, right-click the blast furnace to claim it, and place a chest above with cobblestone inside.<reset>"

    eclipse_realm:
      title: "<dark_gray>Eclipse Realm<reset>"
      lore:
        - "<gray>The two roads of sun and moon meet in the eclipse.<reset>"
      details:
        - "<gray>Walk the 'sun' Tidal Depths and the 'moon' Moonless Waste, and the eclipse chapter opens.<reset>"
        - "<gray>The third expedition: a dim dusk where the battlefield and Eclipse Dial have already formed.<reset>"
      hint: "<gray>First walk the Tidal Depths and the Moonless Waste, then travel to the <white>Eclipse Realm<reset> from the study.<reset>"

    eclipse_warden:
      title: "<yellow>Eclipse Warden<reset>"
      lore:
        - "<gray>When the eclipse falls, the Warden awakens.<reset>"
      details:
        - "<gray>At the Eclipse Dial in the Eclipse Realm, hold a <gold>Sun Core<reset> + <aqua>Moon Core<reset> and right-click the core to summon it.<reset>"
        - "<gray>Defeating it drops an <yellow>Eclipse Crystal<reset> — the key to tier-3 facilities.<reset>"
      hint: "<gray>Summon and defeat the Eclipse Warden in the Eclipse Realm to obtain an Eclipse Crystal.<reset>"

    seedling_cultivator:
      title: "<white>Seedling Cultivator<reset>"
      lore:
        - "<gray>Free greenhouse plant processing from doing it by hand.<reset>"
      details:
        - "<gray>Seedling Cultivator: Moonlight-driven, processes plant materials (cactus→dye, kelp→dried kelp, etc.).<reset>"
        - "<gray>Craft the blueprint on the Greenhouse Lv2 tools page, build it within 48 blocks of a Nexus → right-click the composter to claim it.<reset>"
      hint: "<gray>Upgrade the greenhouse to Lv2, craft a 'Seedling Cultivator Blueprint' on the tools page, build it per the blueprint and right-click the composter to claim it.<reset>"

    phenomenon_condenser:
      title: "<white>Phenomenon Condenser<reset>"
      lore:
        - "<gray>Condense ordinary materials into a more refined form.<reset>"
      details:
        - "<gray>Phenomenon Condenser: Moonlight-driven, processes scholarly materials (rotten flesh→leather, paper→book, etc.).<reset>"
        - "<gray>Craft the blueprint on the Study Lv2 tools page, build it within 48 blocks of a Nexus → right-click the lectern to claim it.<reset>"
      hint: "<gray>Upgrade the study to Lv2, craft a 'Phenomenon Condenser Blueprint' on the tools page, build it per the blueprint and right-click the lectern to claim it.<reset>"

    sealed_shrine:
      title: "<white>Sealed Shrine<reset>"
      lore:
        - "<gray>A trial of radiance lore — break the seal and take the treasure.<reset>"
      details:
        - "<gray>Sealed Shrine: generated naturally in the Overworld, with a sealed treasure chest and a chiseled deepslate controller.<reset>"
        - "<gray>Opening the chest directly is sealed; you must grasp the Radiance Nexus lore + hold an Energy Crystal and right-click the controller to unseal it.<reset>"
      hint: "<gray>First build a Radiance Nexus, then find a structure of a deepslate platform + amethyst pillars in the Overworld, and right-click the central chiseled deepslate while holding an Energy Crystal.<reset>"

    facility_growth_3:
      title: "<yellow>Tier-3 Facilities<reset>"
      lore:
        - "<gray>The light of the eclipse pours into the base's final layer.<reset>"
      details:
        - "<gray>Use Eclipse Crystals to raise the Workshop/Study/Greenhouse to Lv3 (no upgrade structure needed).<reset>"
        - "<gray>Lv3: workshop combat enchants, study regional forecast, greenhouse double output.<reset>"
      hint: "<gray>Gather Eclipse Crystals and Nexus radiance, then click 'Upgrade → Lv3' on the facility page.<reset>"

    solar_lunar_unity:
      title: "<yellow>Solar-Lunar Unity<reset>"
      lore:
        - "<gray>The two currents converge; eclipse light seals the rift.<reset>"
      details:
        - "<gray>Complete the Solar line (Tidal Depths) and the Lunar line (Moonless Waste).<reset>"
        - "<gray>Defeat the Eclipse Warden and obtain an Eclipse Crystal.<reset>"
        - "<gray>Raise all three facilities to Lv3.<reset>"
      hint: "<gray>Finish both Solar and Lunar storylines, then upgrade all three facilities to the top.<reset>"

