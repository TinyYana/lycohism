messages:
  # First-join welcome hint (shown once per account, never repeated).
  welcome:
    - "<gradient:#8fd3ff:#d9f3ff>This world has a layer of natural phenomena.</gradient>"
    - "<gray>At dawn, break grass or flowers for a chance to get <white>Morning Dew</white>.</gray>"
    - "<gray>Once you find your first natural phenomenon, you'll receive an <white>Attunement Manual</white>.</gray>"
    - "<gray>Stuck? Type <yellow>/lyco progress</yellow>.</gray>"
    - "<dark_gray>Facilities open with Sneak + empty hand + right-click.</dark_gray>"
  common:
    missing-materials: "<red>Not enough materials.</red> <gray>Requires: {costs}</gray>"
    recipe-locked: "<gray>This recipe still has unidentified materials; pick those materials up by hand first.</gray>"
  crafting:
    confirm-vanilla: "<yellow>This vanilla recipe will consume a Lycohism item.</yellow> <gray>Click again within 10 seconds to confirm; Shift+right-click to never ask again.</gray>"
    confirm-disabled: "<gray>Vanilla crafting warnings permanently disabled.</gray>"
  structure-break:
    confirm: "<yellow>This block belongs to {structure}.</yellow> <gray>Mine again within 10 seconds to confirm; Shift+break to never ask again.</gray>"
    confirm-disabled: "<gray>Multiblock structure removal warnings permanently disabled.</gray>"
  tools:
    dew-light-used: "<white>The Dewlight Vial dissolves into a faint glow, lighting the next two minutes.</white>"
    flower-shears-grown: "<white>Flower Vein flows along the stems, and the crop is mature.</white>"
    flower-shears-harvested: "<white>Harvested and replanted the crop.</white>"
    moon-pouch-capacity: "<gray>Stored <white>{stored}</white> / {capacity}</gray>"
    moon-pouch-entry: "<dark_gray>· {item} x{amount}</dark_gray>"
    moon-pouch-released: "<white>The Moon Pouch released its stored natural phenomena.</white>"
    moon-pouch-empty: "<gray>The Moon Pouch holds no natural phenomena yet.</gray>"
    wind-vane-status: "<aqua>Wind Vane</aqua> {period} · {weather} · {moon} <gray>Harvestable: {phenomena}</gray>"
    leyline-probe-status: "<gold>Probe</gold> {item} · {direction} · {vertical} · {distance} blocks"
    leyline-probe-none-status: "<gold>Probe</gold> <dark_gray>no ore veins nearby</dark_gray>"
    held-status-separator: " <dark_gray>|</dark_gray> "
    bookmark-remembered: "<white>The Flower Bookmark remembered this place.</white>"
    bookmark-empty: "<gray>Shift+right-click first to remember a place.</gray>"
    bookmark-other-world: "<gray>That place is in another world.</gray>"
    bookmark-arrived: "<white>You are at the place the Flower Bookmark remembered.</white>"
    bookmark-guide: "<white>Guiding: {arrow} <gray>still <white>{distance}</white> blocks</gray>"
    rain-tending-mature: "<gray>This crop is already mature.</gray>"
    rain-tending-grown: "<white>Rain Breath seeps into the soil, and the crop grows upward.</white>"
    bandage-used: "<white>The rain-pattern unfurls, and the wound settles a little.</white>"
    bandage-not-needed: "<gray>There's no need for a bandage right now.</gray>"
    moss-balm-used: "<white>The moss balm sinks into your skin, and the wound slowly heals.</white>"
    moss-fertile-used: "<white>The moss fertilizer spreads, and the plants around you shoot up.</white>"
    moss-fertile-empty: "<gray>There are no plants here to coax into growth.</gray>"
    ember-used: "<white>Ember Bloom shatters in your palm; flame cannot harm you for a while.</white>"
    crystal-status: "<gold>Sunlight</gold> {sun}<dark_gray>/{cap}</dark_gray> <dark_gray>·</dark_gray> <aqua>Moonlight</aqua> {moon}<dark_gray>/{cap}</dark_gray>"
    crystal-banked: "<white>The Energy Crystal poured <yellow>{amount}</yellow> radiance into your energy pool.</white>"
    crystal-empty: "<gray>The Energy Crystal has no radiance to pour, or your energy pool is full.</gray>"
    focus-sun: "<gold>Sunlight courses through you, becoming a blessing of the sun.</gold>"
    focus-moon: "<aqua>Moonlight courses through you, becoming a blessing of the moon.</aqua>"
    focus-no-sun: "<gray>Not enough Sunlight. Charge an Energy Crystal in daylight and pour it into your pool first.</gray>"
    focus-no-moon: "<gray>Not enough Moonlight. Travel to the Moonless Waste and fill the Energy Crystal with Moonlight.</gray>"
    solar-pick-used: "<gold>Solar fire pours in, and mining turns swift.</gold>"
    solar-pick-empty: "<gray>Not enough Sunlight to drive the Solar Pickaxe.</gray>"
    lunar-spore-used: "<aqua>Lunar spores scatter, and the plants around you shoot up.</aqua>"
    lunar-spore-empty: "<gray>There are no plants to coax into growth here, or not enough Moonlight.</gray>"
    compass-reading: "<aqua>Star Chart</aqua> {name} <gray>·</gray> {arrow} <gray>·</gray> <white>{distance}</white> blocks"
    compass-none: "<gray>No registered energy towers nearby.</gray>"
    blueprint-preview: "<gray>Translucent preview: <green>green = matched</green>, <aqua>light blue = to be placed</aqua>. Shift+right-click to build.</gray>"
    blueprint-materials: "<gray>Blocks required: {materials}</gray>"
    blueprint-built: "<green>Built per the blueprint.</green>"
    blueprint-missing: "<red>Not enough materials to build per the blueprint.</red>"
    blueprint-invalid: "<gray>This blueprint has no matching structure.</gray>"
    building-wand: "<gray>The Building Wand placed <white>{amount}</white> blocks.</gray>"
    wand-preview: "<gray>Previewing <white>{mode}</white>, <white>{amount}</white> blocks total; right-click again within 5 seconds to confirm.</gray>"
    wand-mode: "<gray>Building Wand mode switched to: <white>{mode}</white>.</gray>"
    hammer-preview: "<gray>Previewed the next stone variant; right-click again within 5 seconds to confirm the shaping.</gray>"
  discovery:
    manual-granted: "<gray>An <white>Attunement Manual</white> appears in your inventory; right-click to read it.</gray>"
  facility:
    workshop-required: "<red>You must repair the workshop first.</red>"
    workshop-repaired: "<green>The workshop answered the natural materials and is repaired.</green>"
    workshop-crafted: "<green>The workshop crafted {item}.</green>"
    blueprint-crafted: "<green>The workshop drew the <white>{item}</white> blueprint.</green> <gray>Right-click for the translucent outline, Shift+right-click to build it using materials (remember to build it near a Radiance Nexus).</gray>"
    workshop-status:
      - "<gray>Workshop level: <white>{level}</white> / 3.</gray>"
      - "<gray>Lv1: tool crafting, material processing, Rain-Breath enchanting.</gray>"
