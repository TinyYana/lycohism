# Lycohism text settings (English)
# All player-facing text lives here so wording, tone and colours can change without
# recompiling. Format is MiniMessage: https://docs.advntr.dev/minimessage/format.html
#
# Note: book pages use a light parchment background. Use dark colours (black / dark_gray /
# dark_green / dark_purple / dark_aqua / dark_red ...) so the text stays readable —
# avoid white / gray / yellow on book pages.

# ── GUI appearance (shared by every facility menu for a consistent look) ──────────────
gui:
  filler-material: GRAY_STAINED_GLASS_PANE
  header-material: PINK_PETALS
  back-material: ARROW
  breadcrumb-separator: " ▸ "
  back: "<white>Back</white>"
  back-lore:
    - "<dark_gray>Return to the previous page.</dark_gray>"

  common:
    requires: "<gray>Requires:</gray>"
    cost-line: "<gray>· {item} <white>x{amount}</white></gray>"
    cost-hidden: "<dark_gray>· <obfuscated>unknown material</obfuscated> <gray>x{amount}</gray></dark_gray>"
    cost-hidden-hint: "<dark_gray>Pick up the unknown material once and its name will reveal itself.</dark_gray>"
    cost-plain: "{item} x{amount}"
    click-craft: "<yellow>Click to craft.</yellow>"
    click-repair: "<yellow>Click to repair.</yellow>"
    click-enchant: "<yellow>Click to apply Mending.</yellow>"
    click-cultivate: "<dark_gray>Click to cultivate.</dark_gray>"

  # Facility upgrade button (shared by all three facilities).
  facility:
    upgrade: "<gradient:#ffe9a8:#c0a8ff>Upgrade this facility → Lv{level}</gradient>"
    # {structure} upgrade-structure name, {sun}/{moon} Nexus radiance cost.
    upgrade-lore:
      - "<gray>Build the facility into its <white>{structure}</white> rigid structure to reach Lv2.</gray>"
      - "<gray>Flow: <gold>Sun/Moon Tower</gold> → <yellow>Relay</yellow> → <aqua>Radiance Nexus</aqua> → upgrade here.</gray>"
      - "<gray>Costs Nexus <gold>{sun} Sunlight</gold> / <aqua>{moon} Moonlight</aqua>.</gray>"
    # Lv2→Lv3: unlocked with an Eclipse Crystal from the Eclipse Warden, no upgrade structure needed.
    upgrade-lore-3:
      - "<gray>Use an <gradient:#ffd86b:#b07cff>Eclipse Crystal</gradient> to raise the facility to Lv3 — its third tier.</gray>"
      - "<gray>The crystal drops from summoning and defeating the <white>Eclipse Warden</white> in the <white>Eclipse Realm</white>.</gray>"
      - "<gray>Costs Nexus <gold>{sun} Sunlight</gold> / <aqua>{moon} Moonlight</aqua>.</gray>"
    upgrade-action: "<yellow>Stand by the upgrade structure to upgrade; for Lv3 you only need the Eclipse Crystal and radiance.</yellow>"
    # Shown in place of the upgrade button once a facility is maxed (Lv3).
    maxed: "<gradient:#ffd86b:#b07cff>Fully attuned — Lv3</gradient>"
    maxed-lore:
      - "<gray>This facility is attuned to its peak — there is no higher tier.</gray>"
      - "<dark_gray>Tier-3 content is reachable beside the upgrade structure (or via command).</dark_gray>"

  workshop:
    root: "<dark_aqua>Workshop</dark_aqua>"
    broken: "<dark_gray>Workshop (broken)</dark_gray>"
    tools-leaf: "<aqua>Craft Tools</aqua>"
    materials-leaf: "<aqua>Process Materials</aqua>"
    tools-lore:
      - "<gray>Craft living tools with their full use and cost shown.</gray>"
    materials-lore:
      - "<gray>Convert common building materials in batches.</gray>"
    repair: "<yellow>Repair Workshop</yellow>"
    repair-lore:
      - "<gray>The workshop must be repaired before it works.</gray>"
    status: "<aqua>Workshop Status</aqua>"
    status-lore:
      - "<gray>Level <white>{level}</white> / 3</gray>"
      - "<gray>Available: tool crafting, material processing, Mending.</gray>"
      - "<dark_gray>Click to view the full details in chat.</dark_gray>"
    mending: "<gradient:#8fd3ff:#ffffff>Rain-Breath Enchant</gradient>"
    mending-lore:
      - "<gray>Permanently apply Mending to your main-hand tool.</gray>"
      - "<gray>Also consumes <white>{levels}</white> experience levels.</gray>"
    mending-lore-2:
      - "<gray>Permanently apply Mending<gold> + Unbreaking III</gold> to your main-hand tool.</gray>"
      - "<gray>Also consumes <white>{levels}</white> experience levels.</gray>"
      - "<dark_gray>Upgraded workshop bonus.</dark_gray>"
    mending-lore-3:
      - "<gray>Permanently apply Mending<gold> + Unbreaking III</gold> to your main-hand tool.</gray>"
      - "<gray>Plus <red>Sharpness / Power / Protection / Efficiency</red> by item type.</gray>"
      - "<gray>Also consumes <white>{levels}</white> experience levels.</gray>"
      - "<dark_gray>Tier-3 (Eclipse) combat enhancement.</dark_gray>"
    conversion: "<gray>{input} → {output}</gray>"
    conversion-n: "<gray>{input} → {output} ×{amount}</gray>"
    conversion-action: "<dark_gray>Click to convert a whole batch from your inventory.</dark_gray>"
    output-name: "<aqua>{item}</aqua>"
    header-main: "<aqua>Workshop</aqua>"
    header-main-lore:
      - "<gray>A repaired crafting post.</gray>"
      - "<gray>Choose one of the options below.</gray>"
    header-broken-lore:
      - "<gray>The workshop still sleeps.</gray>"
      - "<gray>Gather the materials and click to wake it.</gray>"
    header-tools-lore:
      - "<gray>Craft living tools from natural materials.</gray>"
    header-materials-lore:
      - "<gray>Convert building materials from your inventory in batches.</gray>"
    header-materials-lore-2:
      - "<gray>Convert building materials from your inventory in batches.</gray>"
      - "<gold>Upgrade the workshop: double the yield and unlock more processing.</gold>"

  study:
    root: "<dark_aqua>Study</dark_aqua>"
    sealed: "<dark_gray>Study (dormant)</dark_gray>"
    header-main: "<aqua>Study</aqua>"
    header-main-lore:
      - "<gray>A record of the Path of Attunement you have walked.</gray>"
      - "<gray>Choose a category below.</gray>"
    header-sealed-lore:
      - "<gray>The scattered records are not yet in order.</gray>"
      - "<gray>Gather the materials and click to set the study in order.</gray>"
    repair: "<yellow>Set the Study in Order</yellow>"
    repair-lore:
      - "<gray>Bring the scattered nature records back into order.</gray>"
    # ── Categories (the three entries on root) ─────────────────────────────
    books-leaf: "<aqua>Books</aqua>"
    books-lore:
      - "<gray>Read the manual, compendium and discovery records.</gray>"
    tools-leaf: "<light_purple>Memory Tools</light_purple>"
    tools-lore:
      - "<gray>Craft tools for observation and record-keeping.</gray>"
    map-mark: "<gradient:#aaccff:#e0f0ff>Mark Nearest Energy Tower</gradient>"
    map-mark-lore:
      - "<gray>Gives you a locked map centred on the nearest energy tower.</gray>"
      - "<dark_gray>Unlocked by upgrading the study.</dark_gray>"
    map-mark-name: "<gradient:#aaccff:#e0f0ff>{name} Location Map</gradient>"
    forecast: "<gradient:#ffd86b:#b07cff>Regional Forecast</gradient>"
    forecast-lore:
      - "<gray>Read out every natural phenomenon harvestable here and now.</gray>"
      - "<dark_gray>Tier-3 (Eclipse) exploration enhancement.</dark_gray>"
    progress-leaf: "<aqua>Path of Attunement</aqua>"
    progress-lore:
      - "<gray>Look back on the road walked and see the next step.</gray>"
    expedition-leaf: "<gradient:#8fd3ff:#d9f3ff>Expedition</gradient>"
    expedition-lore:
      - "<gray>Unlock and travel directly to an expedition site.</gray>"
    header-books-lore:
      - "<gray>Read through the attunement records you have gathered.</gray>"
    header-tools-lore:
      - "<gray>Craft memory tools from natural materials.</gray>"
    header-expedition-lore:
      - "<gray>Follow the rain-marks beyond the Overworld.</gray>"
    # ── Books leaf ──────────────────────────────────────────
    manual: "<light_purple>Attunement Manual</light_purple>"
    manual-lore:
      - "<gray>See the next step you can take right now.</gray>"
    compendium: "<aqua>Nature Compendium</aqua>"
    compendium-lore:
      - "<gray>View the natural phenomena you have discovered.</gray>"
    record: "<green>Discovery Record</green>"
    record-lore:
      - "<gray>Look back on the attunements you have completed.</gray>"
    # ── Expedition leaf ──────────────────────────────────────────
    expedition-enter: "<gradient:#8fd3ff:#d9f3ff>Enter the Rainfall Forest</gradient>"
    expedition-enter-name: "<gradient:#8fd3ff:#d9f3ff>Travel to {name}</gradient>"
    expedition-locked-name: "<dark_gray>{name} (locked)</dark_gray>"
    expedition-enter-lore:
      - "<gray>Unlocked. Click to enter the expedition world directly.</gray>"
      - "<dark_gray>No extra entry item is given.</dark_gray>"
    expedition-return: "<white>Return to Departure Point</white>"
    expedition-return-lore:
      - "<gray>Click to return to where you were before the expedition.</gray>"
    gate-locked: "<dark_gray>Rainfall Forest (locked)</dark_gray>"
    gate-locked-lore:
      - "<gray>The rain-marks are still faint; the entrance is not yet unlocked.</gray>"
      - "<gray>Set foot in the <white>Nether</white>, then come back and try again.</gray>"
    # The Eclipse Realm is where the sun and moon lines converge; when locked, state the
    # solution plainly so players know to finish both expedition lines first.
    gate-locked-lore-eclipse_realm:
      - "<gray>Sun and moon have not yet eclipsed here; the gate stays shut.</gray>"
      - "<gray>First walk both the <gold>Tidal Depths</gold> (sun) and <aqua>Moonless Waste</aqua> (moon) lines;</gray>"
      - "<gray>with both attunements complete, the gate to the eclipse will appear.</gray>"
    status: "<aqua>Study Status</aqua>"
    status-lore:
      - "<gray>Level <white>{level}</white> / 3</gray>"
      - "<gray>Categories: Books, Memory Tools, Expedition.</gray>"
      - "<dark_gray>Click to view the full details in chat.</dark_gray>"
  greenhouse:
    root: "<dark_aqua>Greenhouse</dark_aqua>"
    broken: "<dark_gray>Greenhouse (overgrown)</dark_gray>"
    cultivate-leaf: "<green>Cultivate</green>"
    tools-leaf: "<green>Plant Tools</green>"
    cultivate-lore:
      - "<gray>Trade Flower Vein for common and rare plants.</gray>"
    tools-lore:
      - "<gray>Craft tools to ripen, harvest and replant.</gray>"
    repair: "<yellow>Reclaim Greenhouse</yellow>"
    repair-lore:
      - "<gray>Make the overgrown greenhouse fit to grow in again.</gray>"
    status: "<green>Greenhouse Status</green>"
    status-lore:
      - "<gray>Level <white>{level}</white> / 3</gray>"
      - "<gray>Available: Flower Vein & Moss Bloom cultivation, Flower Vein Shears, Moss Balm and Moss Fertilizer.</gray>"
      - "<dark_gray>Click to view the full details in chat.</dark_gray>"
    output-name: "<green>{item} x{amount}</green>"
    header-main: "<green>Greenhouse</green>"
    header-main-lore:
      - "<gray>A place for plants and Flower Vein to settle.</gray>"
      - "<gray>Choose one of the options below.</gray>"
    header-broken-lore:
      - "<gray>The greenhouse is still overgrown.</gray>"
      - "<gray>Gather the materials and click to reclaim it.</gray>"
    header-cultivate-lore:
      - "<gray>Cultivate plant materials with Flower Vein.</gray>"
    header-tools-lore:
      - "<gray>Craft plant-line tools.</gray>"

  admin:
    title: "<dark_purple>Lycohism Admin</dark_purple>"
    header: "<light_purple>Admin Tools</light_purple>"
    header-lore:
      - "<gray>Version <white>{version}</white> | Debug {debug}</gray>"
      - "<gray>Test items, stages and expeditions in one place.</gray>"
    materials: "<aqua>Give Natural Materials</aqua>"
    materials-lore:
      - "<gray>Pick a Lycohism natural material.</gray>"
    tools: "<light_purple>Give Tools</light_purple>"
    tools-lore:
      - "<gray>Pick a tool or test item.</gray>"
    stages: "<yellow>Adjust Game Stage</yellow>"
    stages-lore:
      - "<gray>Set a chapter as the current progress.</gray>"
    expedition: "<gradient:#8fd3ff:#d9f3ff>Switch Expedition World</gradient>"
    expedition-lore:
      - "<gray>Enter ignoring unlock gates; return if already on an expedition.</gray>"
    reload: "<green>Reload Config</green>"
    reload-lore:
      - "<gray>Re-read config, content and progression.</gray>"
    facilities: "<aqua>Facility Levels</aqua>"
    facilities-lore:
      - "<gray>Quickly set your own facility levels to test repair / upgrade / Lv2 content.</gray>"
    facilities-header-lore:
      - "<gray>Click to cycle that facility's level (0→1→2→3→0).</gray>"
    facility-level: "<gray>Current level: <white>{level}</white> / 3</gray>"
    click-facility: "<yellow>Click to change level.</yellow>"
    sounds: "<aqua>Sound Test Set</aqua>"
    sounds-lore:
      - "<gray>Audition four note-block melodies.</gray>"
    sounds-header-lore:
      - "<gray>Each uses the same scale so you can compare timbres.</gray>"
    sound-chime: "<light_purple>Chime</light_purple>"
    sound-harp: "<gold>Harp</gold>"
    sound-flute: "<green>Flute</green>"
    sound-bell: "<yellow>Bell</yellow>"
    click-sound:
      - "<yellow>Click to audition.</yellow>"
    items-header-lore:
      - "<gray>Click an item to receive one directly.</gray>"
    stages-header-lore:
      - "<gray>Click a chapter to set it as the current stage.</gray>"
      - "<dark_gray>The glowing compass is the current stage.</dark_gray>"
    item-id: "<dark_gray>ID: {id}</dark_gray>"
    stage-id: "<dark_gray>Stage ID: {id}</dark_gray>"
    click-give: "<yellow>Click to receive.</yellow>"
    click-stage: "<yellow>Click to switch.</yellow>"
    expedition-header-lore:
      - "<gray>Pick an expedition world to travel to directly (ignoring gates).</gray>"
    expedition-id: "<dark_gray>Expedition ID: {id}</dark_gray>"
    click-expedition: "<yellow>Click to travel.</yellow>"
    expedition-return: "<white>Return to Overworld</white>"
    expedition-return-lore:
      - "<gray>If on an expedition world, click to return to your departure point.</gray>"

  nexus:
    title: "<gradient:#ffe9a8:#c0a8ff>Radiance Nexus</gradient>"
    header: "<gold>Radiance Nexus</gold>"
    header-lore:
      - "<gray>Your base's radiance store.</gray>"
      - "<gray>Flow: <gold>Sun/Moon Tower</gold> → <yellow>Relay</yellow> → <aqua>Nexus</aqua> → upgrade facilities.</gray>"
      - "<gray>Owner: <white>{owner}</white> | Members: <white>{members}</white></gray>"
      - "<dark_gray>Use /lycohism nexus share <player> to share access.</dark_gray>"
    sun: "<gold>☀ Sunlight</gold>"
    sun-lore:
      - "<gray>Stored <white>{value}</white> / {cap}</gray>"
      - "<dark_gray>Fed in by Sun Towers through Relays.</dark_gray>"
    moon: "<aqua>☾ Moonlight</aqua>"
    moon-lore:
      - "<gray>Stored <white>{value}</white> / {cap}</gray>"
      - "<dark_gray>Fed in by Moon Towers through Relays.</dark_gray>"

  # Standalone UI for the Path of Attunement (progression line).
  progression:
    title: "<dark_aqua>Path of Attunement</dark_aqua>"
    header: "<aqua>Path of Attunement</aqua>"
    header-lore:
      - "<gray>The road you have walked, and the next step.</gray>"
      - "<gray>Completed <white>{done}</white> / {total}</gray>"
    advancement-root-title: "Lycohism"
    advancement-root-description: "A tale of attuning to nature."
    advancement-intro-title: "The Tale You Know"
    advancement-intro-description: "The world still holds natural responses you have yet to notice."
    done-name: "<green>✔ {title}</green>"
    unlocked-label: "<aqua>Unlocked:</aqua>"
    current-name: "<yellow>▶ {title}</yellow>"
    objective-label: "<gold>Current objective:</gold>"
    locked-name: "<dark_gray>???</dark_gray>"
    locked-lore:
      - "<dark_gray>You have not reached this step yet.</dark_gray>"
    upcoming-name: "<dark_gray>⌛ {title}</dark_gray>"

