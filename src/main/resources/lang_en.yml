      - "<gray>Lv2 (build Greenhouse II): Lunar Spore, more advanced cultivation products, <aqua>Seedling Cultivator Blueprint<reset> (auto plant processing, needs a Moon Core).<reset>"
      - "<gray>Lv3 (Eclipse Crystal): double cultivation output.<reset>"
    cultivated: "<green>The greenhouse cultivated <white>{amount}<reset> {item}.<reset>"
    study-repaired: "<green>The study remembered the road you have walked.<reset>"
    study-crafted: "<green>The study compiled {item}.<reset>"
    study-status:
      - "<gray>Study level: <white>{level}<reset> / 3.<reset>"
      - "<gray>Lv1: manual, compendium, discovery record, Wind Vane, Moon Pouch, Star Compass, expedition entrance.<reset>"
      - "<gray>Lv2 (build Study II): mark the nearest energy tower onto a map, <aqua>Phenomenon Condenser Blueprint<reset> (auto material condensing, needs a Moon Core).<reset>"
      - "<gray>Lv3 (Eclipse Crystal): regional forecast — lists what is harvestable here and now; personal Sun/Moon caps ×1.5.<reset>"
  expedition:
    entered: "<white>You followed the rain-marks and set foot in {name}.<reset>"
    title:
      rainfall_forest: "<aqua>Rainfall Forest<reset>"
      moonless_waste: "<dark_gray>Moonless Waste<reset>"
      eclipse_realm: "<dark_gray>Eclipse Realm<reset>"
      tidal_depths: "<dark_aqua>Tidal Depths<reset>"
    subtitle:
