# Function description for each automation machine (injected into blueprint lore + right-click status).
content-descriptions:
  attunement_engine:
    - "<gray>Uses <gold>Sunlight<reset>: stone processing (cobble→stone→stone bricks, sand→sandstone, granite→polished granite, etc.).<reset>"
    - "<gray>Uses <aqua>Moonlight<reset>: deepslate processing (deepslate→deepslate bricks, cobbled deepslate→polished deepslate, blackstone→polished blackstone, etc.).<reset>"
    - "<dark_gray>Once built, right-click the blast furnace controller to claim it; place a chest directly above as the input bin.<reset>"
  seedling_cultivator:
    - "<gray>Uses <aqua>Moonlight<reset>: plant processing (cactus→green dye ×2, sugar cane→sugar ×2, kelp→dried kelp ×2, bone meal→bone).<reset>"
    - "<dark_gray>Once built, right-click the composter controller to claim it; place a chest directly above as the plant-material bin.<reset>"
  phenomenon_condenser:
    - "<gray>Uses <aqua>Moonlight<reset>: material condensing (rotten flesh→leather, paper→book, ink sac→black dye ×2, blaze rod→blaze powder ×4, glowstone dust→glowstone).<reset>"
    - "<dark_gray>Once built, right-click the lectern controller to claim it; place a chest directly above as the material bin.<reset>"
  infernal_relay:
    - "<gray>An ancient ruin deep in the Nether, its soul fire still burning.<reset>"
    - "<dark_gray>Right-click the soul fire to claim it; afterwards you can build an Ember Forge to refine Infernal Shards.<reset>"
  ember_forge:
    - "<gray>Uses <gold>Sunlight<reset>: with Ember Bloom as catalyst, refine blaze rods + nether wart into 3 Infernal Shards.<reset>"
    - "<dark_gray>Once built, empty-hand right-click the central magma block to view the recipe; base is 9 nether bricks with polished blackstone brick pillars at the corners.<reset>"

