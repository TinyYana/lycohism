# Lycohism 設定檔
# https://github.com/TinyYana/lycohism

# 啟用後會在 console 輸出額外的 debug 訊息。
debug: false

# 玩家文字語系 / Player text language.
#   auto = 跟著伺服器的系統地區（JVM locale）自動選；zh 地區用繁體中文，其餘用英文。
#   auto = follow the server's system locale; Chinese-region hosts get 繁體中文, everyone else English.
#   zh   = 一律繁體中文 / always Traditional Chinese (lang_zh.yml)
#   en   = 一律英文 / always English (lang_en.yml)
# 對應檔案是 lang_<語系>.yml，可自行編輯後 /lyco reload。
language: auto

# 稽核紀錄：把插件產出/移動的東西（給予、掉落、合成、輝能消耗、結構認領）寫到
# plugins/lycohism/logs/lycohism-audit.log，方便多人伺服器追查經濟與重複刷。
audit:
  enabled: true

# 玩家訊息前綴，支援 MiniMessage 格式：https://docs.advntr.dev/minimessage/format.html
prefix: "<gradient:#f7a8b8:#ffd6e0>[Lycohism]</gradient> <reset>"

# 輝能系統（v0.6 日與月能量）。
# v0.6.1：玩家在戶外見天時「自己」被動蓄能（白天日輝、夜晚月輝）；池滿後溢流自動注入
# 背包裡的蓄能晶。靠近日晷／月晷（自然生成的能量塔）會提高對應能量的蓄積速度。
# 之後（v0.7）的設施升級會消耗這裡的能量。
energy:
  sun-cap: 200          # 日輝池上限
  moon-cap: 200         # 月輝池上限
  base-charge: 2        # 每秒（見天時）累積的基礎量
  tower-bonus: 3        # 靠近對應能量塔時的倍率
  tower-radius: 16.0    # 能量塔加成／光環的作用半徑（格）

# 輝能據點（v0.7）。玩家建造並右鍵啟動「輝能核心」當基地能量倉；日輝塔／月輝塔產能，
# 經能量中繼器一段段串到核心。之後的設施升級會消耗核心裡的輝能。
nexus:
  capacity: 5000            # 核心日輝/月輝各自的容量上限
  network-range: 48.0      # 節點之間（核心↔中繼↔塔）可連接的最大「水平」距離（格，約 3 區塊）
  production-per-cycle: 10   # 每個連上的塔、每秒灌進核心的量（塔只在對應時段＋見天時產能）

# 設施升級的成本（/lycohism upgrade <設施>）：材料 ＋ 附近核心的輝能。
facility-upgrade:
  nexus-sun: 500            # Lv1→Lv2 消耗核心日輝
  nexus-moon: 500           # Lv1→Lv2 消耗核心月輝
  materials:                # 額外材料（id:數量；Lycohism 素材或原版方塊）
    - "GOLD_BLOCK:2"
    - "AMETHYST_BLOCK:2"
  # Lv2→Lv3：用擊敗蝕影守望者掉落的「蝕輝結晶」開啟，不需升級結構（v0.8）。
  tier-3:
    nexus-sun: 1200         # Lv2→Lv3 消耗核心日輝
    nexus-moon: 1200        # Lv2→Lv3 消耗核心月輝
    crystal: 1             # 蝕輝結晶 數量
    materials:
      - "NETHERITE_INGOT:1"
      - "radiant_ore:6"

# v0.8 BOSS「蝕影守望者」：在暮蝕之境蓋好日月儀、手持日輝核心＋月輝核心右鍵核心召喚。
eclipse-boss:
  health: 450             # 最大生命（一隻強化凋零靈，沿用其原生 boss bar 與 AI）
  crystal-drop: 1         # 擊殺掉落的蝕輝結晶數量（設施升三階的鑰匙）

# v0.8.1 #2：高難度遠征維度裡，自然生成的生物整體強化（不影響主世界與低階遠征）。
expedition-mob-boost:
  worlds:
    - lycohism_moonless_waste
    - lycohism_eclipse_realm
    - lycohism_tidal_depths
  health-mult: 2.0        # 最大生命倍率
  speed-mult: 1.1         # 移動速度倍率（小幅，避免追不到）
  scale: 1.15            # 體型（generic.scale）
  strength-amplifier: 1   # 力量等級（1 = 力量 I；0 = 不加）

# v0.9.1 自動化：自動調律機（attunement_engine）。蓋好剛性多方塊、右鍵高爐控制器認領；每個處理週期
# 從機器正上方的容器（玩家自放的箱子/木桶）取一份原料、消耗附近輝能核心的輝能、把加工成品放回容器。
# 讓基地接手「工房建材加工」的重複點擊，並給輝能網路一個持續的能量出口。MVP 只做原版建材加工。
automation:
  process-every-cycles: 5   # 每隔幾個 EnergyService 週期（約 20 tick）處理一次；5 ≈ 每 5 秒
  # 格式 "輸入>輸出[:數量];能量類型(SUN/MOON);每次消耗的輝能"。一次處理一份輸入。
  # 日輝線（白天蓄的能量）跑石材加工；月輝線（夜晚蓄的）跑深色岩石加工——兩種能量都有自動化用途。
  recipes:
    # 日輝線：明亮石材
    - "COBBLESTONE>STONE:1;SUN;4"
    - "STONE>STONE_BRICKS:1;SUN;4"
    - "SAND>SANDSTONE:1;SUN;4"
    - "GRANITE>POLISHED_GRANITE:1;SUN;4"
    - "DIORITE>POLISHED_DIORITE:1;SUN;4"
    - "ANDESITE>POLISHED_ANDESITE:1;SUN;4"
    # 月輝線：深色岩石（調律機）
    - "DEEPSLATE>DEEPSLATE_BRICKS:1;MOON;4"
    - "COBBLED_DEEPSLATE>POLISHED_DEEPSLATE:1;MOON;4"
    - "BLACKSTONE>POLISHED_BLACKSTONE:1;MOON;4"
    - "TUFF>TUFF_BRICKS:1;MOON;4"
    # 月輝線：植物加工（育苗機風格）
    - "CACTUS>GREEN_DYE:2;MOON;4"
    - "SUGAR_CANE>SUGAR:2;MOON;4"
    - "KELP>DRIED_KELP:2;MOON;3"
    - "COBBLESTONE>MOSSY_COBBLESTONE:1;MOON;10"
    - "BONE_MEAL>BONE:1;MOON;6"
    # 月輝線：學術凝縮（現象凝縮台風格）
    - "ROTTEN_FLESH>LEATHER:1;MOON;12"
    - "PAPER>BOOK:1;MOON;8"
    - "INK_SAC>BLACK_DYE:2;MOON;4"
    - "BLAZE_ROD>BLAZE_POWDER:4;MOON;6"
    - "GLOWSTONE_DUST>GLOWSTONE:1;MOON;8"
